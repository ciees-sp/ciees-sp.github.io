<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Space Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #c8c8d0;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  overflow: hidden;
  height: 100vh;
}

#canvas-container {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

#info-panel {
  position: absolute;
  top: 20px; right: 20px;
  background: rgba(10, 10, 15, 0.85);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(200, 200, 208, 0.1);
  border-radius: 8px;
  padding: 16px 20px;
  max-width: 280px;
  font-size: 12px;
  line-height: 1.6;
  z-index: 10;
  transition: opacity 0.3s;
}

#info-panel h2 {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
  color: #e0e0e8;
}

#info-panel .stat {
  display: flex;
  justify-content: space-between;
  margin-bottom: 4px;
}

#info-panel .stat .label { color: #888; }
#info-panel .stat .value { color: #c8c8d0; }

#hover-info {
  position: absolute;
  bottom: 20px; left: 20px;
  background: rgba(10, 10, 15, 0.85);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(200, 200, 208, 0.1);
  border-radius: 8px;
  padding: 14px 18px;
  font-size: 12px;
  line-height: 1.6;
  z-index: 10;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}

#hover-info .color-name {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 6px;
}

#hover-info .swatch {
  width: 100%;
  height: 28px;
  border-radius: 4px;
  margin-bottom: 8px;
}

#controls {
  position: absolute;
  bottom: 20px; right: 20px;
  background: rgba(10, 10, 15, 0.85);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(200, 200, 208, 0.1);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 11px;
  z-index: 10;
}

#controls .key {
  display: inline-block;
  background: rgba(200, 200, 208, 0.1);
  border: 1px solid rgba(200, 200, 208, 0.15);
  border-radius: 3px;
  padding: 1px 6px;
  margin-right: 4px;
  font-size: 10px;
}

#controls div { margin-bottom: 4px; }
#controls div:last-child { margin-bottom: 0; }

#gap-overlay {
  position: absolute;
  top: 20px; left: 20px;
  background: rgba(10, 10, 15, 0.9);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(200, 200, 208, 0.1);
  border-radius: 8px;
  padding: 16px 20px;
  max-width: 320px;
  font-size: 12px;
  line-height: 1.6;
  z-index: 10;
  display: none;
}

#gap-overlay h2 {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 10px;
  color: #e0e0e8;
}

.gap-item {
  margin-bottom: 8px;
  padding: 6px 8px;
  background: rgba(200, 200, 208, 0.04);
  border-radius: 4px;
}

.gap-item .gap-region { font-weight: 600; color: #c8c8d0; }
.gap-item .gap-desc { color: #888; font-size: 11px; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="info-panel">
  <h2>CIELAB COLOR SPACE</h2>
  <div class="stat"><span class="label">named CSS colors</span><span class="value" id="count">—</span></div>
  <div class="stat"><span class="label">L* range</span><span class="value" id="l-range">—</span></div>
  <div class="stat"><span class="label">a* range</span><span class="value" id="a-range">—</span></div>
  <div class="stat"><span class="label">b* range</span><span class="value" id="b-range">—</span></div>
  <div class="stat"><span class="label">largest gap</span><span class="value" id="largest-gap">—</span></div>
  <div style="margin-top: 10px; border-top: 1px solid rgba(200,200,208,0.08); padding-top: 8px;">
    <div class="stat"><span class="label">viewing</span><span class="value" id="space-label">perceptual (L*a*b*)</span></div>
  </div>
</div>

<div id="hover-info">
  <div class="swatch" id="hover-swatch"></div>
  <div class="color-name" id="hover-name">—</div>
  <div class="stat"><span class="label">hex</span><span class="value" id="hover-hex">—</span></div>
  <div class="stat"><span class="label">L*</span><span class="value" id="hover-l">—</span></div>
  <div class="stat"><span class="label">a*</span><span class="value" id="hover-a">—</span></div>
  <div class="stat"><span class="label">b*</span><span class="value" id="hover-b">—</span></div>
  <div class="stat"><span class="label">nearest</span><span class="value" id="hover-nearest">—</span></div>
</div>

<div id="controls">
  <div><span class="key">drag</span> rotate</div>
  <div><span class="key">scroll</span> zoom</div>
  <div><span class="key">G</span> show gaps</div>
  <div><span class="key">S</span> toggle space</div>
  <div><span class="key">R</span> reset view</div>
</div>

<div id="gap-overlay">
  <h2>GAPS IN NAMED COLOR SPACE</h2>
  <div id="gap-list"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── CSS Named Colors ──
const CSS_COLORS = {
  aliceblue: '#F0F8FF', antiquewhite: '#FAEBD7', aqua: '#00FFFF', aquamarine: '#7FFFD4',
  azure: '#F0FFFF', beige: '#F5F5DC', bisque: '#FFE4C4', black: '#000000',
  blanchedalmond: '#FFEBCD', blue: '#0000FF', blueviolet: '#8A2BE2', brown: '#A52A2A',
  burlywood: '#DEB887', cadetblue: '#5F9EA0', chartreuse: '#7FFF00', chocolate: '#D2691E',
  coral: '#FF7F50', cornflowerblue: '#6495ED', cornsilk: '#FFF8DC', crimson: '#DC143C',
  cyan: '#00FFFF', darkblue: '#00008B', darkcyan: '#008B8B', darkgoldenrod: '#B8860B',
  darkgray: '#A9A9A9', darkgreen: '#006400', darkkhaki: '#BDB76B', darkmagenta: '#8B008B',
  darkolivegreen: '#556B2F', darkorange: '#FF8C00', darkorchid: '#9932CC', darkred: '#8B0000',
  darksalmon: '#E9967A', darkseagreen: '#8FBC8F', darkslateblue: '#483D8B', darkslategray: '#2F4F4F',
  darkturquoise: '#00CED1', darkviolet: '#9400D3', deeppink: '#FF1493', deepskyblue: '#00BFFF',
  dimgray: '#696969', dodgerblue: '#1E90FF', firebrick: '#B22222', floralwhite: '#FFFAF0',
  forestgreen: '#228B22', fuchsia: '#FF00FF', gainsboro: '#DCDCDC', ghostwhite: '#F8F8FF',
  gold: '#FFD700', goldenrod: '#DAA520', gray: '#808080', green: '#008000',
  greenyellow: '#ADFF2F', honeydew: '#F0FFF0', hotpink: '#FF69B4', indianred: '#CD5C5C',
  indigo: '#4B0082', ivory: '#FFFFF0', khaki: '#F0E68C', lavender: '#E6E6FA',
  lavenderblush: '#FFF0F5', lawngreen: '#7CFC00', lemonchiffon: '#FFFACD', lightblue: '#ADD8E6',
  lightcoral: '#F08080', lightcyan: '#E0FFFF', lightgoldenrodyellow: '#FAFAD2', lightgray: '#D3D3D3',
  lightgreen: '#90EE90', lightpink: '#FFB6C1', lightsalmon: '#FFA07A', lightseagreen: '#20B2AA',
  lightskyblue: '#87CEFA', lightslategray: '#778899', lightsteelblue: '#B0C4DE', lightyellow: '#FFFFE0',
  lime: '#00FF00', limegreen: '#32CD32', linen: '#FAF0E6', magenta: '#FF00FF',
  maroon: '#800000', mediumaquamarine: '#66CDAA', mediumblue: '#0000CD', mediumorchid: '#BA55D3',
  mediumpurple: '#9370DB', mediumseagreen: '#3CB371', mediumslateblue: '#7B68EE', mediumspringgreen: '#00FA9A',
  mediumturquoise: '#48D1CC', mediumvioletred: '#C71585', midnightblue: '#191970', mintcream: '#F5FFFA',
  mistyrose: '#FFE4E1', moccasin: '#FFE4B5', navajowhite: '#FFDEAD', navy: '#000080',
  oldlace: '#FDF5E6', olive: '#808000', olivedrab: '#6B8E23', orange: '#FFA500',
  orangered: '#FF4500', orchid: '#DA70D6', palegoldenrod: '#EEE8AA', palegreen: '#98FB98',
  paleturquoise: '#AFEEEE', palevioletred: '#DB7093', papayawhip: '#FFEFD5', peachpuff: '#FFDAB9',
  peru: '#CD853F', pink: '#FFC0CB', plum: '#DDA0DD', powderblue: '#B0E0E6',
  purple: '#800080', rebeccapurple: '#663399', red: '#FF0000', rosybrown: '#BC8F8F',
  royalblue: '#4169E1', saddlebrown: '#8B4513', salmon: '#FA8072', sandybrown: '#F4A460',
  seagreen: '#2E8B57', seashell: '#FFF5EE', sienna: '#A0522D', silver: '#C0C0C0',
  skyblue: '#87CEEB', slateblue: '#6A5ACD', slategray: '#708090', snow: '#FFFAFA',
  springgreen: '#00FF7F', steelblue: '#4682B4', tan: '#D2B48C', teal: '#008080',
  thistle: '#D8BFD8', tomato: '#FF6347', turquoise: '#40E0D0', violet: '#EE82EE',
  wheat: '#F5DEB3', white: '#FFFFFF', whitesmoke: '#F5F5F5', yellow: '#FFFF00',
  yellowgreen: '#9ACD32'
};

// ── Color Math ──
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16) / 255;
  const g = parseInt(hex.slice(3,5), 16) / 255;
  const b = parseInt(hex.slice(5,7), 16) / 255;
  return [r, g, b];
}

function rgbToLab(rgb) {
  let [r, g, b] = rgb;
  // sRGB → linear
  r = r > 0.04045 ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
  g = g > 0.04045 ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
  b = b > 0.04045 ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;
  // linear RGB → XYZ (D65)
  let x = (r * 0.4124564 + g * 0.3575761 + b * 0.1804375) / 0.95047;
  let y = (r * 0.2126729 + g * 0.7151522 + b * 0.0721750) / 1.00000;
  let z = (r * 0.0193339 + g * 0.1191920 + b * 0.9503041) / 1.08883;
  // XYZ → Lab
  const f = t => t > 0.008856 ? Math.pow(t, 1/3) : (7.787 * t) + 16/116;
  x = f(x); y = f(y); z = f(z);
  const L = (116 * y) - 16;
  const a = 500 * (x - y);
  const bVal = 200 * (y - z);
  return [L, a, bVal];
}

function deltaE(lab1, lab2) {
  return Math.sqrt(
    Math.pow(lab1[0] - lab2[0], 2) +
    Math.pow(lab1[1] - lab2[1], 2) +
    Math.pow(lab1[2] - lab2[2], 2)
  );
}

// ── Build color data ──
const colors = [];
for (const [name, hex] of Object.entries(CSS_COLORS)) {
  const rgb = hexToRgb(hex);
  const lab = rgbToLab(rgb);
  colors.push({ name, hex, rgb, lab });
}

// Find nearest neighbor for each color
for (const c of colors) {
  let minDist = Infinity;
  let nearest = null;
  for (const other of colors) {
    if (other === c) continue;
    const d = deltaE(c.lab, other.lab);
    if (d < minDist) { minDist = d; nearest = other; }
  }
  c.nearest = nearest;
  c.nearestDist = minDist;
}

// ── Find gaps (void regions) ──
function findGaps() {
  // Sample the CIELAB space and find regions far from any named color
  const gaps = [];
  const step = 15;
  for (let L = 5; L <= 95; L += step) {
    for (let a = -100; a <= 100; a += step) {
      for (let b = -100; b <= 100; b += step) {
        let minDist = Infinity;
        for (const c of colors) {
          const d = deltaE([L, a, b], c.lab);
          if (d < minDist) minDist = d;
        }
        if (minDist > 28) {
          gaps.push({ L, a, b, dist: minDist });
        }
      }
    }
  }
  gaps.sort((a, b) => b.dist - a.dist);
  return gaps.slice(0, 12);
}

function describeRegion(L, a, b) {
  let lightness = L < 30 ? 'dark' : L < 60 ? 'mid' : 'light';
  let hue = '';
  if (Math.abs(a) < 10 && Math.abs(b) < 10) hue = 'neutral gray';
  else {
    const angle = Math.atan2(b, a) * 180 / Math.PI;
    if (angle >= -22.5 && angle < 22.5) hue = 'red-magenta';
    else if (angle >= 22.5 && angle < 67.5) hue = 'yellow-orange';
    else if (angle >= 67.5 && angle < 112.5) hue = 'yellow-green';
    else if (angle >= 112.5 && angle < 157.5) hue = 'green';
    else if (angle >= 157.5 || angle < -157.5) hue = 'cyan-green';
    else if (angle >= -157.5 && angle < -112.5) hue = 'cyan-blue';
    else if (angle >= -112.5 && angle < -67.5) hue = 'blue';
    else if (angle >= -67.5 && angle < -22.5) hue = 'purple-violet';
  }
  return `${lightness} ${hue}`;
}

// ── Three.js Setup ──
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(180, 120, 220);
camera.lookAt(50, 50, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0a0f, 1);
document.getElementById('canvas-container').appendChild(renderer.domElement);

// Group for all color points
const colorGroup = new THREE.Group();
scene.add(colorGroup);

// Scale factors for CIELAB → scene coordinates
const SCALE = 1.2;

// Point cloud for colors
const pointGeo = new THREE.BufferGeometry();
const positions = new Float32Array(colors.length * 3);
const pointColors = new Float32Array(colors.length * 3);
const sizes = new Float32Array(colors.length);

for (let i = 0; i < colors.length; i++) {
  const c = colors[i];
  positions[i*3]     = c.lab[1] * SCALE;      // a* → x
  positions[i*3 + 1] = c.lab[0] * SCALE;      // L* → y
  positions[i*3 + 2] = c.lab[2] * SCALE;      // b* → z
  pointColors[i*3]     = c.rgb[0];
  pointColors[i*3 + 1] = c.rgb[1];
  pointColors[i*3 + 2] = c.rgb[2];
  sizes[i] = 6;
}

pointGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
pointGeo.setAttribute('color', new THREE.BufferAttribute(pointColors, 3));
pointGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

const pointMat = new THREE.ShaderMaterial({
  vertexShader: `
    attribute float size;
    varying vec3 vColor;
    void main() {
      vColor = color;
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (300.0 / -mvPosition.z);
      gl_Position = projectionMatrix * mvPosition;
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    void main() {
      float d = length(gl_PointCoord - vec2(0.5));
      if (d > 0.5) discard;
      float alpha = smoothstep(0.5, 0.3, d);
      gl_FragColor = vec4(vColor, alpha);
    }
  `,
  vertexColors: true,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});

const points = new THREE.Points(pointGeo, pointMat);
colorGroup.add(points);

// Axes
function addAxis(dir, length, color, label) {
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.25 });
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0),
    new THREE.Vector3(dir[0]*length, dir[1]*length, dir[2]*length)
  ]);
  colorGroup.add(new THREE.Line(geo, mat));
  // negative side
  const geo2 = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0),
    new THREE.Vector3(-dir[0]*length*0.5, -dir[1]*length*0.2, -dir[2]*length*0.5)
  ]);
  const mat2 = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.1 });
  colorGroup.add(new THREE.Line(geo2, mat2));
}

addAxis([1,0,0], 140, 0xff4444, 'a*');  // red-green axis
addAxis([0,1,0], 130, 0xaaaaaa, 'L*');  // lightness axis
addAxis([0,0,1], 140, 0x4444ff, 'b*');  // blue-yellow axis

// Subtle grid on the L*=50 plane
const gridMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.03 });
for (let i = -120; i <= 120; i += 30) {
  const g1 = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(i, 50*SCALE, -120),
    new THREE.Vector3(i, 50*SCALE, 120)
  ]);
  colorGroup.add(new THREE.Line(g1, gridMat));
  const g2 = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-120, 50*SCALE, i),
    new THREE.Vector3(120, 50*SCALE, i)
  ]);
  colorGroup.add(new THREE.Line(g2, gridMat));
}

// Gap visualization spheres (hidden by default)
const gapGroup = new THREE.Group();
gapGroup.visible = false;
colorGroup.add(gapGroup);

const gaps = findGaps();
for (const gap of gaps) {
  const gapGeo = new THREE.SphereGeometry(gap.dist * 0.3, 16, 12);
  const gapMat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.04,
    wireframe: true
  });
  const sphere = new THREE.Mesh(gapGeo, gapMat);
  sphere.position.set(gap.a * SCALE, gap.L * SCALE, gap.b * SCALE);
  gapGroup.add(sphere);
}

// ── Camera controls (orbit) ──
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0.8, phi: 1.0, radius: 350 };
const target = new THREE.Vector3(0, 50, 0);

function updateCamera() {
  camera.position.x = target.x + spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.position.y = target.y + spherical.radius * Math.cos(spherical.phi);
  camera.position.z = target.z + spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.lookAt(target);
}
updateCamera();

renderer.domElement.addEventListener('mousedown', (e) => {
  isDragging = true;
  prevMouse = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('mousemove', (e) => {
  if (isDragging) {
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    spherical.theta -= dx * 0.005;
    spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi + dy * 0.005));
    prevMouse = { x: e.clientX, y: e.clientY };
    updateCamera();
  }
});

renderer.domElement.addEventListener('mouseup', () => { isDragging = false; });
renderer.domElement.addEventListener('mouseleave', () => { isDragging = false; });

renderer.domElement.addEventListener('wheel', (e) => {
  spherical.radius = Math.max(100, Math.min(800, spherical.radius + e.deltaY * 0.5));
  updateCamera();
});

// ── Raycasting for hover ──
const raycaster = new THREE.Raycaster();
raycaster.params.Points.threshold = 5;
const mouse = new THREE.Vector2();
const hoverInfo = document.getElementById('hover-info');

renderer.domElement.addEventListener('mousemove', (e) => {
  if (isDragging) return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(points);

  if (intersects.length > 0) {
    const idx = intersects[0].index;
    const c = colors[idx];
    document.getElementById('hover-name').textContent = c.name;
    document.getElementById('hover-hex').textContent = c.hex;
    document.getElementById('hover-l').textContent = c.lab[0].toFixed(1);
    document.getElementById('hover-a').textContent = c.lab[1].toFixed(1);
    document.getElementById('hover-b').textContent = c.lab[2].toFixed(1);
    document.getElementById('hover-swatch').style.background = c.hex;
    document.getElementById('hover-nearest').textContent = `${c.nearest.name} (ΔE ${c.nearestDist.toFixed(1)})`;
    hoverInfo.style.opacity = 1;

    // Highlight point
    const sizeAttr = pointGeo.getAttribute('size');
    for (let i = 0; i < colors.length; i++) sizeAttr.array[i] = 6;
    sizeAttr.array[idx] = 14;
    sizeAttr.needsUpdate = true;
  } else {
    hoverInfo.style.opacity = 0;
    const sizeAttr = pointGeo.getAttribute('size');
    for (let i = 0; i < colors.length; i++) sizeAttr.array[i] = 6;
    sizeAttr.needsUpdate = true;
  }
});

// ── Keyboard controls ──
let showGaps = false;

document.addEventListener('keydown', (e) => {
  if (e.key === 'g' || e.key === 'G') {
    showGaps = !showGaps;
    gapGroup.visible = showGaps;
    const gapOverlay = document.getElementById('gap-overlay');
    if (showGaps) {
      gapOverlay.style.display = 'block';
      const list = document.getElementById('gap-list');
      list.innerHTML = '';
      for (const gap of gaps.slice(0, 6)) {
        const div = document.createElement('div');
        div.className = 'gap-item';
        div.innerHTML = `
          <div class="gap-region">${describeRegion(gap.L, gap.a, gap.b)}</div>
          <div class="gap-desc">L*${gap.L.toFixed(0)} a*${gap.a.toFixed(0)} b*${gap.b.toFixed(0)} — nearest named color is ΔE ${gap.dist.toFixed(1)} away</div>
        `;
        list.appendChild(div);
      }
    } else {
      gapOverlay.style.display = 'none';
    }
  }

  if (e.key === 'r' || e.key === 'R') {
    spherical = { theta: 0.8, phi: 1.0, radius: 350 };
    updateCamera();
  }
});

// ── Stats ──
const labs = colors.map(c => c.lab);
const Ls = labs.map(l => l[0]);
const As = labs.map(l => l[1]);
const Bs = labs.map(l => l[2]);

document.getElementById('count').textContent = colors.length;
document.getElementById('l-range').textContent = `${Math.min(...Ls).toFixed(0)}–${Math.max(...Ls).toFixed(0)}`;
document.getElementById('a-range').textContent = `${Math.min(...As).toFixed(0)}–${Math.max(...As).toFixed(0)}`;
document.getElementById('b-range').textContent = `${Math.min(...Bs).toFixed(0)}–${Math.max(...Bs).toFixed(0)}`;
document.getElementById('largest-gap').textContent = gaps.length > 0 ? `ΔE ${gaps[0].dist.toFixed(1)}` : '—';

// ── Animate ──
function animate() {
  requestAnimationFrame(animate);
  if (!isDragging) {
    spherical.theta += 0.0008;
    updateCamera();
  }
  renderer.render(scene, camera);
}
animate();

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
