<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0c;
    color: #d4d4d8;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    padding: 60px 40px 30px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .header h1 {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #71717a;
    margin-bottom: 12px;
  }

  .header .subtitle {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 400;
    color: #e4e4e7;
    line-height: 1.4;
    max-width: 700px;
  }

  .controls {
    padding: 20px 40px 10px;
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .controls label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #71717a;
  }

  .controls select, .controls button {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    background: #18181b;
    color: #d4d4d8;
    border: 1px solid #27272a;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .controls select:hover, .controls button:hover {
    border-color: #52525b;
  }

  .controls button.active {
    border-color: #a1a1aa;
    color: #fafafa;
  }

  .paragraph-selector {
    display: flex;
    gap: 6px;
    margin-left: auto;
  }

  .paragraph-selector button {

    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    padding: 0;
  }

  .scroll-container {
    padding: 30px 40px 100px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .face-card {
    margin-bottom: 2px;
    padding: 40px 50px;
    background: #111113;
    border: 1px solid transparent;
    border-radius: 3px;
    transition: background 0.4s, border-color 0.4s;
    cursor: pointer;
    position: relative;
  }

  .face-card:hover {
    background: #18181b;
    border-color: #27272a;
  }

  .face-card.expanded {
    background: #18181b;
    border-color: #3f3f46;
  }

  .face-card .face-name {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #52525b;
    margin-bottom: 16px;
    transition: color 0.3s;
  }

  .face-card:hover .face-name,
  .face-card.expanded .face-name {
    color: #71717a;
  }

  .face-card .specimen {
    line-height: 1.65;
    color: #d4d4d8;
    transition: color 0.3s;
  }

  .face-card:hover .specimen {
    color: #e4e4e7;
  }

  .face-card .annotation {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.5s ease, opacity 0.4s ease, margin 0.4s ease;
    opacity: 0;
    margin-top: 0;
  }

  .face-card.expanded .annotation {
    max-height: 400px;
    opacity: 1;
    margin-top: 24px;
  }

  .annotation-inner {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    line-height: 1.7;
    color: #a1a1aa;
    padding-top: 20px;
    border-top: 1px solid #27272a;
  }

    display: inline-block;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 3px;
    margin-right: 8px;
    margin-bottom: 8px;
  }

  .tag.authority { background: #1a1a2a; color: #a0a0f0; }
  .tag.distance { background: #1a2a2a; color: #a0e0e0; }
  .tag.intimacy { background: #2a2a1a; color: #e0d0a0; }
  .tag.urgency { background: #2a1a20; color: #f0a0c0; }
  .tag.craft { background: #1a2a1a; color: #a0d0a0; }
  .tag.nostalgia { background: #2a201a; color: #d0b090; }
  .tag.clinical { background: #1a1a20; color: #b0b0c0; }

    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #27272a;
    transition: color 0.3s;

    background: transparent;

  .mode-toggle button.active {

    border: none;
    border-radius: 0;
    padding: 0;
    background: transparent;

  }

  .morph-mode .face-card .face-index {
    display: none;
  }

  .morph-mode .face-card .annotation {

    align-items: center;

    display: none;
    padding: 20px 40px;

    margin: 0 auto;
    align-items: center;
    gap: 20px;

  .morph-mode .morph-controls {

  }

    height: 2px;
    background: #27272a;
    border-radius: 1px;
    outline: none;

    height: 14px;
    border-radius: 50%;

    cursor: pointer;

  .morph-slider::-webkit-slider-thumb:hover {

  .morph-face-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #52525b;
    min-width: 200px;
    text-align: center;
  }

  .morph-annotation {
    display: none;
    padding: 0 40px 30px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .morph-mode .morph-annotation {
    display: block;
  }

  .morph-annotation .annotation-inner {
    border-top: none;
    padding-top: 0;
  }

  .size-control {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .size-control input[type="range"] {
    width: 80px;
    -webkit-appearance: none;
    appearance: none;
    height: 2px;
    background: #27272a;
    border-radius: 1px;
    outline: none;
  }

  .size-control input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #52525b;
    cursor: pointer;
  }

  .size-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #52525b;
    min-width: 36px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Forensic Typography</h1>
  <div class="subtitle">One paragraph. Thirty typefaces. How much of what you read is the typeface talking?</div>
</div>

<div class="controls">
  <div class="mode-toggle">
    <button class="active" onclick="setMode('stack')" id="btn-stack">Stack</button>
    <button onclick="setMode('morph')" id="btn-morph">Morph</button>
  </div>

  <div class="size-control">
    <label>Size</label>
    <input type="range" min="14" max="28" value="19" oninput="setSize(this.value)" id="size-slider">
    <span class="size-label" id="size-label">19px</span>
  </div>

  <div class="paragraph-selector">
    <label style="align-self: center; margin-right: 6px;">Text</label>
    <button class="active" onclick="setParagraph(0)" id="p-0">1</button>
    <button onclick="setParagraph(1)" id="p-1">2</button>
    <button onclick="setParagraph(2)" id="p-2">3</button>
    <button onclick="setParagraph(3)" id="p-3">4</button>
    <button onclick="setParagraph(4)" id="p-4">5</button>
  </div>
</div>

<div class="morph-controls">
  <input type="range" class="morph-slider" min="0" max="29" value="0" oninput="morphTo(this.value)" id="morph-slider">
  <div class="morph-face-label" id="morph-label">—</div>
</div>

<div class="morph-annotation">
  <div class="annotation-inner" id="morph-annotation-text"></div>
</div>

<div class="scroll-container" id="container"></div>

const paragraphs = [
  `She sat in the waiting room for forty minutes before anyone called her name. The chairs were the kind that look comfortable from a distance but aren't. A television mounted near the ceiling played the news with the sound off, captions two sentences behind. When the door finally opened and a woman with a clipboard appeared, she stood up too quickly and her magazine slid to the floor. She left it there.`,

  `The house had been empty for eleven years when they finally opened the door. Not abandoned — maintained. Someone had been paying the water bill, cutting the grass, replacing the porch light when it burned out. But no one had gone inside. The furniture was where it had always been. A coffee cup sat on the kitchen counter, half full of something that had long since become solid. The calendar on the wall said March.`,

  `Every morning he walked the same route: past the bakery, across the footbridge, along the canal, and up the hill to the shop. He had done this for twenty-two years. He knew which cobblestones were loose, which neighbors would wave, which dogs would bark. When the bakery closed in September, he kept walking past it. The route was the route.`,

  `The committee voted 7 to 4 to approve the revised proposal, with one abstention. The dissenting members cited insufficient data on long-term environmental impact and requested a six-month extension for independent review. The motion carried. The chairperson thanked the members for their diligence and adjourned the meeting at 4:47 PM. Coffee cups were collected. The room was locked.`,

  `I know you probably won't read this all the way through, but I need to say it anyway. The thing about Tuesday wasn't what you think. I wasn't ignoring you — I was trying to figure out what to say that wouldn't make it worse, and by the time I had something, you were already gone. I'm not asking you to forgive me. I'm asking you to believe that I was trying.`
];

  },
  {

    name: "Fraunces",

    note: "Fraunces is an 'old style' face with visible personality — soft, wobbly, characterful in ways that most typefaces carefully avoid. The paragraph becomes a story someone is telling you over a table, not a text you're reading on a screen. The waiting room acquires the tonal quality of spoken memory. 'She stood up too quickly' sounds like a detail the teller just remembered, and smiled at. The magazine on the floor is the kind of thing you'd act out with your hands."

    family: "'Newsreader', serif",

    note: "A newspaper typeface, and the paragraph falls into formation. The waiting room is a story that was filed on deadline — tight, factual, empathetic within professional limits. The details are selected, not accumulated. The television with lagging captions is a journalistic observation: specific, visual, telling. The magazine on the floor is the kicker — the final image the reporter chose to leave you with. Newsreader knows exactly what it's doing."
  },
  {
    family: "'Inconsolata', monospace",
    name: "Inconsolata",
    size: 0.90,

    note: "A humanist monospace — softer than JetBrains Mono but still mechanical in its spacing. The paragraph becomes a draft, something not yet typeset, still in the working file. The waiting room is a scene being written rather than a scene being read. You can almost see the cursor at the end. 'She left it there' feels like the writer typed it, paused, and decided it was enough. The monospace frame turns finished prose into process."

    note: "Screenplay format. The paragraph snaps into a different grammar of reading entirely — you start seeing scene headings, action lines, character cues. The waiting room is INT. WAITING ROOM - DAY. The woman with the clipboard has a name you haven't been told yet. The magazine on the floor is a prop note. Courier Prime doesn't just change how the paragraph looks. It changes what the paragraph is. It's now a set of instructions for someone else to perform."

let currentParagraph = 0;
let currentMode = 'stack';
let currentSize = 19;

function render() {
  const container = document.getElementById('container');
  container.innerHTML = '';
  container.className = currentMode === 'morph' ? 'scroll-container morph-mode' : 'scroll-container';

  if (currentMode === 'stack') {
    faces.forEach((face, i) => {
      const card = document.createElement('div');
      card.className = 'face-card';
      card.onclick = () => card.classList.toggle('expanded');

      const fontSize = currentSize * face.size;

      card.innerHTML = `
        <div class="face-name">${face.name}</div>
        <div class="specimen" style="font-family: ${face.family}; font-size: ${fontSize}px; ${face.weight ? 'font-weight: ' + face.weight + ';' : ''}">${paragraphs[currentParagraph]}</div>
        <div class="annotation">
          <div class="annotation-inner">
            ${face.tags.map(t => `<span class="tag ${t}">${t}</span>`).join('')}
            <p style="margin-top: 8px;">${face.note}</p>
          </div>
        </div>
        <div class="face-index">${String(i + 1).padStart(2, '0')}</div>
      `;

      container.appendChild(card);
    });
  } else {
    const card = document.createElement('div');
    card.className = 'face-card expanded';
    card.id = 'morph-card';

    const face = faces[0];
    const fontSize = currentSize * face.size;

    card.innerHTML = `
      <div class="morph-specimen" style="font-family: ${face.family}; font-size: ${fontSize}px; ${face.weight ? 'font-weight: ' + face.weight + ';' : ''}; line-height: 1.65; color: #d4d4d8;">${paragraphs[currentParagraph]}</div>
    `;

    container.appendChild(card);

    document.getElementById('morph-label').textContent = face.name;
    document.getElementById('morph-annotation-text').innerHTML = `
      ${face.tags.map(t => `<span class="tag ${t}">${t}</span>`).join('')}
      <p style="margin-top: 8px;">${face.note}</p>
    `;
    document.getElementById('morph-slider').value = 0;
  }
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-stack').classList.toggle('active', mode === 'stack');
  document.getElementById('btn-morph').classList.toggle('active', mode === 'morph');
  render();
}

function setParagraph(idx) {
  currentParagraph = idx;
  document.querySelectorAll('.paragraph-selector button').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
  render();
}

function setSize(val) {
  currentSize = parseInt(val);
  document.getElementById('size-label').textContent = val + 'px';
  render();
}

function morphTo(val) {
  const idx = parseInt(val);
  const face = faces[idx];
  const card = document.getElementById('morph-card');
  if (!card) return;

  const specimen = card.querySelector('.morph-specimen');
  const fontSize = currentSize * face.size;

  specimen.style.fontFamily = face.family;
  specimen.style.fontSize = fontSize + 'px';
  specimen.style.fontWeight = face.weight || 400;

  document.getElementById('morph-label').textContent = face.name;
  document.getElementById('morph-annotation-text').innerHTML = `
    ${face.tags.map(t => `<span class="tag ${t}">${t}</span>`).join('')}
    <p style="margin-top: 8px;">${face.note}</p>
  `;
}

render();
</script>
