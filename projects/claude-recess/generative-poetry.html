<title>Generative Poetry Machine</title>

  }

  }

    align-items: center;

  .control-group label {

    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #555;
    font-family: -apple-system, sans-serif;
  }

    background: #14141f;
    color: #aaa;

    color: #ddd;

    line-height: 2;

    letter-spacing: 0.1em;

    padding: 0 40px 40px;

// ============================================================
// SYLLABLE COUNTER — approximate but functional
// ============================================================

function countSyllables(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  if (word.length <= 2) return 1;
  word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
  word = word.replace(/^y/, '');
  const matches = word.match(/[aeiouy]{1,2}/g);
  return matches ? Math.max(1, matches.length) : 1;
}

function lineSyllables(line) {
  return line.split(/\s+/).reduce((sum, w) => sum + countSyllables(w), 0);
}

// ============================================================
// NEAR-RHYME ENGINE — assonance + consonance matching
// ============================================================

function getEndSound(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  const vowels = 'aeiouy';
  let lastVowelIdx = -1;
  for (let i = word.length - 1; i >= 0; i--) {
    if (vowels.includes(word[i])) { lastVowelIdx = i; break; }
  }
  if (lastVowelIdx === -1) return word.slice(-2);
  return word.slice(lastVowelIdx);
}

function nearRhyme(a, b) {
  const ea = getEndSound(a);
  const eb = getEndSound(b);
  if (ea === eb) return true;
  // assonance — same vowel in final syllable
  const va = ea.replace(/[^aeiouy]/g, '');
  const vb = eb.replace(/[^aeiouy]/g, '');
  if (va && vb && va === vb) return true;
  // consonance — same final consonant cluster
  const ca = ea.replace(/[aeiouy]/g, '');
  const cb = eb.replace(/[aeiouy]/g, '');
  if (ca && cb && ca === cb) return true;
  return false;
}

function findRhyme(word, candidates) {
  const rhymes = candidates.filter(c => c !== word && nearRhyme(word, c));
  return rhymes.length > 0 ? pick(rhymes) : pick(candidates);
}

// ============================================================
// UTILITY
// ============================================================

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickN(arr, n) {
  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n);
}

// ============================================================
// LINE BUILDERS — the grammar engine
// ============================================================

function buildLine(pool, usedWords, monoOnly) {
  const patterns = [
    () => `${pick(pool.articles)} ${adj()} ${noun()} ${pick(pool.verbs)}`,
    () => `${pick(pool.verbs)} ${pick(pool.prepositions)} ${pick(pool.articles)} ${adj()} ${noun()}`,
    () => `${pick(pool.prepositions)} ${pick(pool.articles)} ${noun()}, ${pick(pool.articles)} ${noun()} ${pick(pool.verbs)}`,
    () => `${adj()} ${noun()} ${pick(pool.prepositions)} ${adj()} ${noun()}`,
    () => `${pick(pool.articles)} ${noun()} ${pick(pool.verbs)} ${pick(pool.prepositions)} ${noun()}`,
    () => `${pick(pool.verbs)}, ${pick(pool.verbs)}, ${pick(pool.verbs)} ${pick(pool.prepositions)} ${noun()}`,
    () => `${pick(pool.prepositions)} ${noun()} and ${noun()}`,
    () => `${adj()} as ${pick(pool.articles)} ${noun()} ${pick(pool.verbs)}`,
    () => `${pick(pool.articles)} ${noun()} ${pick(pool.verbs)} and ${pick(pool.verbs)}`,
    () => `${pick(pool.prepositions)} ${adj()} ${noun()}, ${pick(pool.verbs)}`,
  ];

  function noun() {
    const candidates = monoOnly ? pool.nouns.filter(w => countSyllables(w) === 1) : pool.nouns;
    return pickFiltered(candidates.length ? candidates : pool.nouns);
  }
  function adj() {
    const candidates = monoOnly ? pool.adjectives.filter(w => countSyllables(w) === 1) : pool.adjectives;
    return pickFiltered(candidates.length ? candidates : pool.adjectives);
  }
  function pickFiltered(arr) {
    const unused = arr.filter(w => !usedWords.has(w));
    const chosen = pick(unused.length ? unused : arr);
    usedWords.add(chosen);
    return chosen;
  }

  return pick(patterns)();
}

function buildSyllabicLine(pool, targetSyllables, usedWords) {
  // try up to 50 times to hit target syllable count
  for (let i = 0; i < 50; i++) {
    const line = buildLine(pool, new Set(usedWords), false);
    const count = lineSyllables(line);
    if (count === targetSyllables) {
      line.split(/\s+/).forEach(w => usedWords.add(w.replace(/[^a-z]/gi, '').toLowerCase()));
      return line;
    }
  }
  // fallback: build word by word
  let line = [];
  let remaining = targetSyllables;
  const allWords = [...pool.nouns, ...pool.verbs, ...pool.adjectives, ...pool.prepositions];
  while (remaining > 0) {
    const fits = allWords.filter(w => countSyllables(w) <= remaining);
    if (fits.length === 0) break;
    const word = pick(fits);
    line.push(word);
    remaining -= countSyllables(word);
    usedWords.add(word.toLowerCase());
  }
  return line.join(' ');
}

// ============================================================
// TITLE GENERATOR
// ============================================================

function generateTitle(pool) {
  const patterns = [
    () => `${pick(pool.nouns)}`,
    () => `${pick(pool.adjectives)} ${pick(pool.nouns)}`,
    () => `${pick(pool.prepositions)} ${pick(pool.nouns)}`,
    () => `${pick(pool.nouns)} and ${pick(pool.nouns)}`,
    () => `the ${pick(pool.nouns)}`,
    () => `${pick(pool.nouns)} ${pick(pool.prepositions)} ${pick(pool.nouns)}`,
  ];
  const title = pick(patterns)();
  return title.split(' ').map((w,i) => {
    if (i > 0 && ['and','the','a','of','in','on','to','for','with','at','by','from'].includes(w)) return w;
    return w.charAt(0).toUpperCase() + w.slice(1);
  }).join(' ');
}

// ============================================================
// FORM GENERATORS
// ============================================================

function generateFreeVerse(pool, constraintType) {
  const lineCount = 5 + Math.floor(Math.random() * 4); // 5-8
  const usedWords = new Set();
  const lines = [];

  for (let i = 0; i < lineCount; i++) {
    let line;
    if (constraintType === 'syllabic') {
      line = buildSyllabicLine(pool, 7, usedWords);
    } else if (constraintType === 'monosyllabic') {
      line = buildLine(pool, usedWords, true);
    } else if (constraintType === 'descending') {
      const maxWords = lineCount - i + 3;
      line = buildLine(pool, usedWords, false);
      const words = line.split(/\s+/).slice(0, Math.max(2, maxWords));
      line = words.join(' ');
    } else if (constraintType === 'anaphora') {
      const opener = i === 0 ? pick(pool.prepositions) + ' ' + pick(pool.articles) : '';
      if (i === 0) {
        line = buildLine(pool, usedWords, false);
        lines._anaphora = line.split(/\s+/)[0];
      } else {
        line = lines._anaphora + ' ' + buildLine(pool, usedWords, false);
      }
    } else if (constraintType === 'norepeat') {
      line = buildLine(pool, usedWords, false);
    } else {
      line = buildLine(pool, usedWords, false);
    }
    lines.push(line);
  }

  // insert a stanza break
  const breakPoint = 2 + Math.floor(Math.random() * (lines.length - 3));
  lines.splice(breakPoint, 0, null); // null = stanza break

  return lines.filter(l => l !== undefined);
}

function generateCouplets(pool, constraintType) {
  const usedWords = new Set();
  const lines = [];

  for (let pair = 0; pair < 3; pair++) {
    let line1 = constraintType === 'syllabic'
      ? buildSyllabicLine(pool, 7, usedWords)
      : buildLine(pool, usedWords, constraintType === 'monosyllabic');

    let line2 = constraintType === 'syllabic'
      ? buildSyllabicLine(pool, 7, usedWords)
      : buildLine(pool, usedWords, constraintType === 'monosyllabic');

    // try for near-rhyme on line endings
    const lastWord1 = line1.split(/\s+/).pop();
    const allEnders = [...pool.nouns, ...pool.verbs, ...pool.adjectives];
    const rhymeWord = findRhyme(lastWord1, allEnders);
    const words2 = line2.split(/\s+/);
    words2[words2.length - 1] = rhymeWord;
    line2 = words2.join(' ');

    if (constraintType === 'anaphora' && pair > 0) {
      line1 = lines[0].split(/\s+/)[0] + ' ' + line1;
      line2 = lines[0].split(/\s+/)[0] + ' ' + line2;
    }

    lines.push(line1);
    lines.push(line2);
    if (pair < 2) lines.push(null); // stanza break
  }
  return lines;
}

function generateTercets(pool, constraintType) {
  const usedWords = new Set();
  const lines = [];

  for (let stanza = 0; stanza < 2; stanza++) {
    for (let i = 0; i < 3; i++) {
      let line = constraintType === 'syllabic'
        ? buildSyllabicLine(pool, 7, usedWords)
        : buildLine(pool, usedWords, constraintType === 'monosyllabic');

      if (constraintType === 'descending') {
        const maxWords = 6 - i;
        line = line.split(/\s+/).slice(0, Math.max(2, maxWords)).join(' ');
      }
      if (constraintType === 'anaphora' && (i === 0 || stanza > 0 && i === 0)) {
        if (stanza === 0 && i === 0) lines._anaphora = line.split(/\s+/)[0];
        else if (i === 0) line = lines._anaphora + ' ' + line;
      }
      lines.push(line);
    }
    if (stanza === 0) lines.push(null);
  }
  return lines;
}

function generateHaikuSequence(pool, constraintType) {
  const usedWords = new Set();
  const lines = [];

  for (let h = 0; h < 3; h++) {
    lines.push(buildSyllabicLine(pool, 5, usedWords));
    lines.push(buildSyllabicLine(pool, 7, usedWords));
    lines.push(buildSyllabicLine(pool, 5, usedWords));
    if (h < 2) lines.push(null);
  }
  return lines;
}

function generateGhazal(pool, constraintType) {
  const usedWords = new Set();
  const lines = [];

  // ghazal: couplets sharing a refrain word (radif) at end of second line
  // first couplet: both lines end with radif
  const radif = pick(pool.nouns);

  for (let c = 0; c < 5; c++) {
    let line1 = constraintType === 'syllabic'
      ? buildSyllabicLine(pool, 7, usedWords)
      : buildLine(pool, usedWords, constraintType === 'monosyllabic');

    let line2 = constraintType === 'syllabic'
      ? buildSyllabicLine(pool, 7, usedWords)
      : buildLine(pool, usedWords, constraintType === 'monosyllabic');

    // first couplet: both end with radif; rest: only second line
    if (c === 0) {
      line1 = line1.split(/\s+/).slice(0, -1).join(' ') + ' ' + radif;
    }
    line2 = line2.split(/\s+/).slice(0, -1).join(' ') + ' ' + radif;

    lines.push(line1);
    lines.push(line2);
    if (c < 4) lines.push(null);
  }
  return lines;
}

// ============================================================
// MAIN GENERATE
// ============================================================

let poemCount = 0;
const historyPoems = [];

function generate() {
  const form = document.getElementById('form').value;
  const paletteName = document.getElementById('palette').value;
  const constraintType = document.getElementById('constraint').value;
  const pool = pools[paletteName];

  let lines;
  switch (form) {
    case 'free': lines = generateFreeVerse(pool, constraintType); break;
    case 'couplet': lines = generateCouplets(pool, constraintType); break;
    case 'tercet': lines = generateTercets(pool, constraintType); break;
    case 'haiku': lines = generateHaikuSequence(pool, constraintType); break;
    case 'ghazal': lines = generateGhazal(pool, constraintType); break;
    default: lines = generateFreeVerse(pool, constraintType);
  }

  // clean: remove internal properties
  const cleanLines = lines.filter(l => typeof l === 'string' || l === null);

  const title = generateTitle(pool);
  poemCount++;

  // render
  const poemEl = document.getElementById('poem');
  const titleEl = document.getElementById('poemTitle');
  const constraintEl = document.getElementById('constraintDisplay');

  titleEl.textContent = title;

  let html = '';
  let delay = 0;
  cleanLines.forEach(line => {
    if (line === null) {
      html += '<div class="stanza-break"></div>';
    } else {
      html += `<div class="line" style="animation-delay: ${delay}ms">${line}</div>`;
      delay += 180;
    }
  });
  poemEl.innerHTML = html;

  // constraint annotation
  const formLabels = { free: 'free verse', couplet: 'couplets', tercet: 'tercets', haiku: 'haiku sequence', ghazal: 'ghazal' };
  const constraintLabels = { none: 'unconstrained', syllabic: '7-syllable lines', anaphora: 'anaphoric repetition', descending: 'descending line length', monosyllabic: 'monosyllabic vocabulary', norepeat: 'no repeated words' };

  let annotation = `<span class="tag">form:</span> ${formLabels[form]}`;
  annotation += ` · <span class="tag">palette:</span> ${paletteName}`;
  annotation += ` · <span class="tag">constraint:</span> ${constraintLabels[constraintType]}`;

  if (form === 'haiku') {
    annotation += `\n<span class="tag">syllable pattern:</span> 5-7-5 × 3`;
  }
  if (form === 'ghazal') {
    const radifLine = cleanLines.filter(l => l !== null).pop();
    const radif = radifLine ? radifLine.split(/\s+/).pop() : '?';
    annotation += `\n<span class="tag">radif:</span> "${radif}"`;
  }
  if (constraintType === 'syllabic' && form !== 'haiku') {
    const counts = cleanLines.filter(l => l !== null).map(l => lineSyllables(l));
    annotation += `\n<span class="tag">syllable counts:</span> [${counts.join(', ')}]`;
  }
  annotation += `\n<span class="tag">poem:</span> #${poemCount}`;

  constraintEl.innerHTML = annotation.replace(/\n/g, '<br>');

  // save to history
  historyPoems.unshift({ title, lines: cleanLines, annotation });
  if (historyPoems.length > 20) historyPoems.pop();
  renderHistory();
}

function toggleHistory() {
  document.getElementById('history').classList.toggle('visible');
}

function renderHistory() {
  const el = document.getElementById('history');
  // skip the most recent (it's displayed above)
  const past = historyPoems.slice(1);
  el.innerHTML = past.map(p => {
    let html = `<div class="history-poem"><div class="poem-title">${p.title}</div><div class="poem">`;
    p.lines.forEach(line => {
      if (line === null) html += '<div class="stanza-break"></div>';
      else html += `<div class="line">${line}</div>`;
    });
    html += '</div></div>';
    return html;
  }).join('');
}

// generate one on load
generate();
</script>
