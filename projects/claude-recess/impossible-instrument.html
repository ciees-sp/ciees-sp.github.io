<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Impossible Instruments</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #c8c8d0; font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }

  #canvas { position: fixed; top: 0; left: 0; z-index: 0; }

  #ui {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; padding: 20px;
  }

  h1 {
    font-size: 14px; letter-spacing: 6px; text-transform: uppercase;
    color: #555; margin-bottom: 30px; font-weight: 400;
  }

  #instrument-name {
    font-size: 28px; color: #e8e8f0; margin-bottom: 8px;
    font-weight: 300; letter-spacing: 2px;
  }

  #instrument-desc {
    font-size: 12px; color: #666; max-width: 500px; text-align: center;
    line-height: 1.6; margin-bottom: 40px;
  }

  #play-area {
    width: 600px; height: 280px;
    border: 1px solid #222; border-radius: 8px;
    position: relative; cursor: crosshair;
    background: rgba(10, 10, 15, 0.8);
    margin-bottom: 30px;
  }

  #play-hint {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 11px; color: #333; letter-spacing: 2px; pointer-events: none;
    transition: opacity 0.5s;
  }

  #params {
    display: flex; gap: 30px; margin-bottom: 30px;
  }

  .param {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }

  .param label {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #555;
  }

  .param .value {
    font-size: 18px; color: #aab;
  }

  #instruments {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 700px;
  }

  .inst-btn {
    background: rgba(255,255,255,0.03); border: 1px solid #222;
    color: #777; padding: 8px 16px; border-radius: 4px;
    font-family: 'Courier New', monospace; font-size: 11px;
    cursor: pointer; transition: all 0.3s; letter-spacing: 1px;
  }

  .inst-btn:hover { border-color: #555; color: #aaa; }
  .inst-btn.active { border-color: #667; color: #dde; background: rgba(255,255,255,0.06); }

  #physics-note {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    font-size: 10px; color: #333; letter-spacing: 1px; text-align: center;
    max-width: 600px; line-height: 1.5;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
  <h1>Impossible Instruments</h1>
  <div id="instrument-name">The Cathedral Bell</div>
  <div id="instrument-desc">A bronze bell 40 meters tall. The fundamental frequency is so low it's felt more than heard. Upper partials ring for minutes.</div>

  <div id="play-area">
    <div id="play-hint">click or drag to play</div>
  </div>

  <div id="params">
    <div class="param">
      <label>Size</label>
      <div class="value" id="p-size">40m</div>
    </div>
    <div class="param">
      <label>Material</label>
      <div class="value" id="p-mat">Bronze</div>
    </div>
    <div class="param">
      <label>Fundamental</label>
      <div class="value" id="p-fund">—</div>
    </div>
    <div class="param">
      <label>Decay</label>
      <div class="value" id="p-decay">—</div>
    </div>
  </div>

  <div id="instruments">
    <button class="inst-btn active" data-inst="cathedral-bell">Cathedral Bell</button>
    <button class="inst-btn" data-inst="ocean-drum">Ocean Drum</button>
    <button class="inst-btn" data-inst="wire-harp">Wire Harp</button>
    <button class="inst-btn" data-inst="glass-canyon">Glass Canyon</button>
    <button class="inst-btn" data-inst="iron-flute">Iron Flute</button>
    <button class="inst-btn" data-inst="silk-thunder">Silk Thunder</button>
  </div>
</div>

<div id="physics-note">approximate physics — real dimensions, imagined resonance</div>

<script>
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let ctx = null;

function ensureAudio() {
  if (!ctx) ctx = new AudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
}

// ========== INSTRUMENT DEFINITIONS ==========
const instruments = {
  'cathedral-bell': {
    name: 'The Cathedral Bell',
    desc: 'A bronze bell 40 meters tall. The fundamental frequency is so low it\'s felt more than heard. Upper partials ring for minutes.',
    size: '40m', material: 'Bronze',
    // Real bell partial ratios (approximately): 1, 2.0, 2.5, 3.0, 4.07, 5.4, 6.12, 8.0
    // A 40m bell fundamental ≈ 4.3 Hz (way below hearing). We shift up for playability.
    play(x, y) {
      ensureAudio();
      const baseFreq = 22 + x * 40; // 22-62 Hz range — feel the low end
      const intensity = 1 - y; // top = loud
      const partials = [1, 2.0, 2.52, 3.01, 4.07, 5.4, 6.12, 8.0, 11.0];
      const amps =     [0.5, 0.6, 0.3, 0.25, 0.2, 0.15, 0.1, 0.08, 0.04];
      const decays =   [12,  8,   10,  6,    5,   4,    3,   2,    1.5];

      const master = ctx.createGain();
      master.gain.value = intensity * 0.15;
      master.connect(ctx.destination);

      partials.forEach((ratio, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = baseFreq * ratio;
        // Add slight inharmonicity (bells aren't perfectly harmonic)
        osc.frequency.value *= (1 + (Math.random() - 0.5) * 0.003);
        gain.gain.setValueAtTime(amps[i] * intensity, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + decays[i]);
        osc.connect(gain);
        gain.connect(master);
        osc.start();
        osc.stop(ctx.currentTime + decays[i] + 0.1);
      });

      // Subharmonic rumble
      const sub = ctx.createOscillator();
      const subGain = ctx.createGain();
      sub.type = 'sine';
      sub.frequency.value = baseFreq * 0.5;
      subGain.gain.setValueAtTime(0.3 * intensity, ctx.currentTime);
      subGain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 15);
      sub.connect(subGain);
      subGain.connect(master);
      sub.start();
      sub.stop(ctx.currentTime + 15.1);

      return { fund: baseFreq.toFixed(1) + ' Hz', decay: '~12s' };
    }
  },

  'ocean-drum': {
    name: 'The Ocean Drum',
    desc: 'A drum head made of seawater, 200 meters across, stretched over a volcanic crater. Strike it and the surface ripples for miles.',
    size: '200m', material: 'Seawater',
    play(x, y) {
      ensureAudio();
      const baseFreq = 8 + x * 30;
      const intensity = 1 - y;

      const master = ctx.createGain();
      master.gain.value = intensity * 0.2;
      master.connect(ctx.destination);

      // Water drum: heavily damped, complex initial transient, long low-freq sustain
      // Initial splash transient — noise burst
      const bufferSize = ctx.sampleRate * 0.3;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.05));
      }
      const noise = ctx.createBufferSource();
      noise.buffer = buffer;
      const noiseFilter = ctx.createBiquadFilter();
      noiseFilter.type = 'lowpass';
      noiseFilter.frequency.value = baseFreq * 8;
      noiseFilter.Q.value = 2;
      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0.6 * intensity, ctx.currentTime);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.4);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(master);
      noise.start();

      // Drum membrane modes — circular membrane has non-integer ratios
      // (0,1)=1.0, (1,1)=1.594, (2,1)=2.136, (0,2)=2.296, (3,1)=2.653
      const modes = [1.0, 1.594, 2.136, 2.296, 2.653, 3.156];
      const mAmps = [0.5, 0.3, 0.2, 0.25, 0.15, 0.1];
      const mDecays = [18, 12, 8, 10, 6, 4]; // Water damps slowly at low freq

      modes.forEach((ratio, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = baseFreq * ratio;
        // Slow pitch bend down — water surface sagging
        osc.frequency.linearRampToValueAtTime(baseFreq * ratio * 0.95, ctx.currentTime + mDecays[i]);
        gain.gain.setValueAtTime(mAmps[i] * intensity, ctx.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + mDecays[i]);
        osc.connect(gain);
        gain.connect(master);
        osc.start(ctx.currentTime + 0.01);
        osc.stop(ctx.currentTime + mDecays[i] + 0.1);
      });

      return { fund: baseFreq.toFixed(1) + ' Hz', decay: '~18s' };
    }
  },

  'wire-harp': {
    name: 'The Wire Harp',
    desc: 'A single steel wire strung between two mountains, 3 kilometers long. Wind excites it. Pluck it and the note takes 9 seconds to arrive.',
    size: '3km', material: 'Steel',
    play(x, y) {
      ensureAudio();
      // A 3km steel wire: fundamental ≈ 0.06 Hz (way sub-audio)
      // We hear harmonics 200+ in reality. Model as: very high harmonic content, metallic
      const baseFreq = 40 + x * 200;
      const intensity = 1 - y;
      const delay = 0.3 + x * 0.8; // Simulated propagation delay (compressed from 9s)

      const master = ctx.createGain();
      master.gain.value = intensity * 0.12;
      master.connect(ctx.destination);

      // Karplus-Strong inspired — plucked string with very long decay
      const harmonics = 16;
      for (let h = 1; h <= harmonics; h++) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = h % 2 === 0 ? 'sine' : 'triangle';
        const freq = baseFreq * h;
        if (freq > 12000) continue;
        osc.frequency.value = freq;
        // Steel wire: slight inharmonicity increases with partial number
        osc.frequency.value *= (1 + 0.0001 * h * h);
        // Higher harmonics decay faster
        const decayTime = 20 / (1 + h * 0.3);
        const amp = (1 / h) * 0.5;
        gain.gain.setValueAtTime(0, ctx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(amp * intensity, ctx.currentTime + delay + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + delay + decayTime);
        osc.connect(gain);
        gain.connect(master);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + decayTime + 0.1);
      }

      // Sympathetic wind hum — continuous low drone that the pluck excites
      const wind = ctx.createOscillator();
      const windGain = ctx.createGain();
      wind.type = 'sine';
      wind.frequency.value = baseFreq * 0.5;
      wind.frequency.linearRampToValueAtTime(baseFreq * 0.52, ctx.currentTime + 10);
      windGain.gain.setValueAtTime(0, ctx.currentTime);
      windGain.gain.linearRampToValueAtTime(0.04 * intensity, ctx.currentTime + 2);
      windGain.gain.linearRampToValueAtTime(0.06 * intensity, ctx.currentTime + delay);
      windGain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 20);
      wind.connect(windGain);
      windGain.connect(master);
      wind.start();
      wind.stop(ctx.currentTime + 20.1);

      return { fund: baseFreq.toFixed(1) + ' Hz', decay: '~20s' };
    }
  },

  'glass-canyon': {
    name: 'The Glass Canyon',
    desc: 'A slot canyon carved from a single piece of glass, 800 meters deep. Sound enters the top and refracts through the walls. Every surface rings.',
    size: '800m deep', material: 'Glass',
    play(x, y) {
      ensureAudio();
      const baseFreq = 200 + x * 2000;
      const intensity = 1 - y;

      const master = ctx.createGain();
      master.gain.value = intensity * 0.08;

      // Long reverb tail via cascaded allpass delays
      const convolver = ctx.createConvolver();
      const reverbLen = ctx.sampleRate * 8;
      const reverbBuf = ctx.createBuffer(2, reverbLen, ctx.sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const d = reverbBuf.getChannelData(ch);
        for (let i = 0; i < reverbLen; i++) {
          // Glass reverb: bright, with distinct echo clusters
          const t = i / ctx.sampleRate;
          const echoCluster = Math.sin(t * 3.7) * 0.3 + 0.7;
          d[i] = (Math.random() * 2 - 1) * Math.exp(-t * 0.5) * echoCluster;
          // Add resonant peaks
          d[i] += Math.sin(i * 0.01) * Math.exp(-t * 0.8) * 0.1;
        }
      }
      convolver.buffer = reverbBuf;
      master.connect(convolver);
      convolver.connect(ctx.destination);
      master.connect(ctx.destination); // dry signal too

      // Glass resonance — very pure tones, high Q
      const freqs = [1, 1.5, 2.0, 2.5, 3.17, 4.0, 5.33, 6.5, 8.0];
      freqs.forEach((ratio, i) => {
        const freq = baseFreq * ratio;
        if (freq > 15000) return;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const amp = 0.3 / (1 + i * 0.4);
        const decay = 6 / (1 + i * 0.2);
        gain.gain.setValueAtTime(amp * intensity, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + decay);
        osc.connect(gain);
        gain.connect(master);
        osc.start();
        osc.stop(ctx.currentTime + decay + 0.1);
      });

      // High shimmer — glass surface reflections
      const shimmer = ctx.createOscillator();
      const shimGain = ctx.createGain();
      shimmer.type = 'sine';
      shimmer.frequency.value = baseFreq * 12;
      if (shimmer.frequency.value < 15000) {
        shimGain.gain.setValueAtTime(0.05 * intensity, ctx.currentTime);
        shimGain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 3);
        shimmer.connect(shimGain);
        shimGain.connect(master);
        shimmer.start();
        shimmer.stop(ctx.currentTime + 3.1);
      }

      return { fund: baseFreq.toFixed(0) + ' Hz', decay: '~8s' };
    }
  },

  'iron-flute': {
    name: 'The Iron Flute',
    desc: 'A flute bored through a solid iron beam, 60 meters long. The air column is enormous. Overblowing produces overtones that shake the ground.',
    size: '60m', material: 'Iron',
    play(x, y) {
      ensureAudio();
      // 60m flute: fundamental ≈ 2.86 Hz (open pipe: f = v/2L, v≈343m/s)
      // Audible from ~3rd harmonic up
      const baseFreq = 18 + x * 60; // Compressed range
      const intensity = 1 - y;
      const overblow = y < 0.3 ? 2 : (y < 0.6 ? 1 : 0); // Top = overblow

      const master = ctx.createGain();
      master.gain.value = intensity * 0.15;
      master.connect(ctx.destination);

      // Flute: odd harmonics dominate (open pipe), breathy noise component
      // Overblowing shifts to 2nd or 3rd register
      const register = overblow + 1;
      const fundamental = baseFreq * register;

      // Breath noise
      const bufSize = ctx.sampleRate * 0.2;
      const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      const bd = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) bd[i] = (Math.random() * 2 - 1);
      const breathSrc = ctx.createBufferSource();
      breathSrc.buffer = buf;
      breathSrc.loop = true;
      const breathFilter = ctx.createBiquadFilter();
      breathFilter.type = 'bandpass';
      breathFilter.frequency.value = fundamental * 2;
      breathFilter.Q.value = 1.5;
      const breathGain = ctx.createGain();
      breathGain.gain.setValueAtTime(0.08 * intensity, ctx.currentTime);
      breathGain.gain.setValueAtTime(0.12 * intensity, ctx.currentTime + 0.1);
      breathGain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 4);
      breathSrc.connect(breathFilter);
      breathFilter.connect(breathGain);
      breathGain.connect(master);
      breathSrc.start();
      breathSrc.stop(ctx.currentTime + 4.1);

      // Tone — odd harmonics for open pipe
      for (let h = 1; h <= 11; h += 2) {
        const freq = fundamental * h;
        if (freq > 12000) continue;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        // Iron resonance: very slow attack (big air column)
        const amp = 0.4 / h;
        const attackTime = 0.15 + 0.1 / register;
        gain.gain.setValueAtTime(0, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(amp * intensity, ctx.currentTime + attackTime);
        gain.gain.setValueAtTime(amp * intensity, ctx.currentTime + attackTime + 2);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 6);
        osc.connect(gain);
        gain.connect(master);
        osc.start();
        osc.stop(ctx.currentTime + 6.1);
      }

      // Ground-shaking sub when overblown
      if (overblow > 0) {
        const sub = ctx.createOscillator();
        const subG = ctx.createGain();
        sub.type = 'sine';
        sub.frequency.value = baseFreq;
        subG.gain.setValueAtTime(0, ctx.currentTime);
        subG.gain.linearRampToValueAtTime(0.3 * intensity, ctx.currentTime + 0.3);
        subG.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 5);
        sub.connect(subG);
        subG.connect(master);
        sub.start();
        sub.stop(ctx.currentTime + 5.1);
      }

      return { fund: fundamental.toFixed(1) + ' Hz', decay: '~6s' };
    }
  },

  'silk-thunder': {
    name: 'Silk Thunder',
    desc: 'A sheet of silk the size of a football field, suspended in a thunderstorm. Lightning strikes it. The silk survives and sings.',
    size: '100m × 50m', material: 'Silk',
    play(x, y) {
      ensureAudio();
      const intensity = 1 - y;

      const master = ctx.createGain();
      master.gain.value = intensity * 0.15;
      master.connect(ctx.destination);

      // Lightning crack — sharp transient
      const crackLen = ctx.sampleRate * 0.08;
      const crackBuf = ctx.createBuffer(1, crackLen, ctx.sampleRate);
      const cd = crackBuf.getChannelData(0);
      for (let i = 0; i < crackLen; i++) {
        const t = i / ctx.sampleRate;
        // Multiple micro-cracks
        const crack = Math.random() > 0.7 ? (Math.random() * 2 - 1) * 2 : 0;
        cd[i] = crack * Math.exp(-t * 80) + (Math.random() * 2 - 1) * Math.exp(-t * 30) * 0.5;
      }
      const crackSrc = ctx.createBufferSource();
      crackSrc.buffer = crackBuf;
      const crackGain = ctx.createGain();
      crackGain.gain.value = 0.7 * intensity;
      crackSrc.connect(crackGain);
      crackGain.connect(master);
      crackSrc.start();

      // Thunder roll — low filtered noise with slow onset
      const thunderLen = ctx.sampleRate * 8;
      const thunderBuf = ctx.createBuffer(2, thunderLen, ctx.sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const td = thunderBuf.getChannelData(ch);
        for (let i = 0; i < thunderLen; i++) {
          const t = i / ctx.sampleRate;
          const envelope = Math.sin(Math.min(t * 2, Math.PI/2)) * Math.exp(-t * 0.4);
          // Rolling quality — amplitude modulation
          const roll = 0.7 + 0.3 * Math.sin(t * 1.7 + ch * 0.5);
          td[i] = (Math.random() * 2 - 1) * envelope * roll;
        }
      }
      const thunderSrc = ctx.createBufferSource();
      thunderSrc.buffer = thunderBuf;
      const thunderFilter = ctx.createBiquadFilter();
      thunderFilter.type = 'lowpass';
      thunderFilter.frequency.value = 150 + x * 200;
      thunderFilter.Q.value = 0.7;
      const thunderGain = ctx.createGain();
      thunderGain.gain.value = 0.5 * intensity;
      thunderSrc.connect(thunderFilter);
      thunderFilter.connect(thunderGain);
      thunderGain.connect(master);
      thunderSrc.start(ctx.currentTime + 0.05);

      // Silk singing — very high, pure, ethereal tones that emerge from the chaos
      const silkBase = 800 + x * 3000;
      const silkPartials = [1, 1.5, 2.0, 2.67, 3.5];
      silkPartials.forEach((ratio, i) => {
        const freq = silkBase * ratio;
        if (freq > 14000) return;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        // Silk vibrates after the crack — delayed entry
        const delay = 0.2 + i * 0.15;
        const amp = 0.15 / (1 + i * 0.5);
        gain.gain.setValueAtTime(0, ctx.currentTime);
        gain.gain.setValueAtTime(0, ctx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(amp * intensity, ctx.currentTime + delay + 0.5);
        gain.gain.setValueAtTime(amp * intensity * 0.8, ctx.currentTime + delay + 3);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + delay + 10);
        // Slow vibrato — silk fluttering
        const lfo = ctx.createOscillator();
        const lfoGain = ctx.createGain();
        lfo.type = 'sine';
        lfo.frequency.value = 2 + Math.random() * 3;
        lfoGain.gain.value = freq * 0.008;
        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);
        lfo.start();
        lfo.stop(ctx.currentTime + delay + 10.1);

        osc.connect(gain);
        gain.connect(master);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + 10.1);
      });

      return { fund: silkBase.toFixed(0) + ' Hz', decay: '~10s' };
    }
  }
};

// ========== VISUALIZATION ==========
const canvas = document.getElementById('canvas');
const vizCtx = canvas.getContext('2d');
let particles = [];
let activeInstrument = 'cathedral-bell';

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(x, y, color, life) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 2;
    this.color = color;
    this.life = life;
    this.maxLife = life;
    this.size = 1 + Math.random() * 2;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.995;
    this.vy *= 0.995;
    this.life--;
  }
  draw() {
    const alpha = (this.life / this.maxLife) * 0.6;
    vizCtx.beginPath();
    vizCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    vizCtx.fillStyle = this.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
    vizCtx.fill();
  }
}

const instColors = {
  'cathedral-bell': 'rgb(180, 140, 80)',
  'ocean-drum': 'rgb(60, 120, 180)',
  'wire-harp': 'rgb(200, 200, 210)',
  'glass-canyon': 'rgb(160, 220, 240)',
  'iron-flute': 'rgb(140, 100, 80)',
  'silk-thunder': 'rgb(220, 180, 255)'
};

function spawnParticles(cx, cy, count) {
  const color = instColors[activeInstrument] || 'rgb(150, 150, 150)';
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 3;
    const p = new Particle(cx, cy, color, 100 + Math.random() * 200);
    p.vx = Math.cos(angle) * speed;
    p.vy = Math.sin(angle) * speed;
    particles.push(p);
  }
}

function animate() {
  vizCtx.fillStyle = 'rgba(10, 10, 15, 0.05)';
  vizCtx.fillRect(0, 0, canvas.width, canvas.height);

  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.update(); p.draw(); });

  requestAnimationFrame(animate);
}
animate();

// ========== INTERACTION ==========
const playArea = document.getElementById('play-area');
const hint = document.getElementById('play-hint');
let hasPlayed = false;

function playAt(e) {
  const rect = playArea.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;

  if (!hasPlayed) { hint.style.opacity = 0; hasPlayed = true; }

  const inst = instruments[activeInstrument];
  const result = inst.play(Math.max(0, Math.min(1, x)), Math.max(0, Math.min(1, y)));

  document.getElementById('p-fund').textContent = result.fund;
  document.getElementById('p-decay').textContent = result.decay;

  // Spawn visualization particles
  spawnParticles(e.clientX, e.clientY, 30 + Math.random() * 40);
}

let isDown = false;
let lastPlay = 0;
playArea.addEventListener('mousedown', (e) => { isDown = true; playAt(e); });
playArea.addEventListener('mousemove', (e) => {
  if (!isDown) return;
  const now = Date.now();
  if (now - lastPlay < 150) return;
  lastPlay = now;
  playAt(e);
});
window.addEventListener('mouseup', () => { isDown = false; });

// Instrument selection
document.querySelectorAll('.inst-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.inst-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeInstrument = btn.dataset.inst;
    const inst = instruments[activeInstrument];
    document.getElementById('instrument-name').textContent = inst.name;
    document.getElementById('instrument-desc').textContent = inst.desc;
    document.getElementById('p-size').textContent = inst.size;
    document.getElementById('p-mat').textContent = inst.material;
    document.getElementById('p-fund').textContent = '—';
    document.getElementById('p-decay').textContent = '—';
    hasPlayed = false;
    hint.style.opacity = 1;
  });
});
</script>
</body>
</html>
