<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPST Ethics — Ethical Principles Hotspot (Full-bleed)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --structure: #16193E;
    --interactive: #0B6A8A;
    --accent: #48AEE1;
    --accent-soft: #B8DEEE;
    --tint: #EDF4F7;
    --canvas: #FFFFFF;
    --text: #1B1B1F;
    --muted: #4A4E63;
    --hairline: #DCE0EA;
    --page-bg: #F4F6F9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: transparent;
    color: var(--text);
    font-family: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .stage {
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 24px;
  }

  /* FULL-BLEED FRAME — sized to Rise's lesson container max (~1200px).
     Same visual signature as the contained version (top accent stripe,
     tinted surface, white interior panels) so the two read as siblings.
     The extra horizontal room lets the constellation and reveal card
     sit side-by-side at full size, no scrolling and no dismissal. */
  .frame {
    width: 100%;
    max-width: 1180px;
    background: transparent;
    overflow: visible;
    position: relative;
  }

  .activity {
    padding: 40px;
  }

  /* EYEBROW — CPST section-pill spec: tinted teal bg, no border,
     11px / 700 / 1.8px letter-spacing. Matches the convention used
     across CPST custom blocks. */
  .activity-eyebrow {
    display: inline-block;
    background: rgba(11, 106, 138, 0.08);
    color: var(--interactive);
    padding: 5px 14px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* CONSTELLATION PROGRESS — small chip at top-left tracking how
     many principles the learner has explored. Flips to "Complete"
     when all seven are visited. Pairs visually with the reset chip
     in the opposite corner. */
  .constellation-progress {
    position: absolute;
    top: 14px;
    left: 14px;
    z-index: 3;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(11, 106, 138, 0.08);
    color: var(--interactive);
    border-radius: 100px;
    padding: 5px 12px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .constellation-progress.is-complete {
    background: var(--interactive);
    color: var(--canvas);
  }
  .constellation-progress.is-complete::before {
    content: '✓';
    font-size: 12px;
    line-height: 1;
    margin-right: 2px;
  }

  /* VISITED NODE BADGE — small checkmark dot at the top-right of any
     node circle the learner has clicked. Persists through reset. */
  .node[data-visited="true"] .node-circle::after {
    content: '';
    position: absolute;
    top: -3px;
    right: -3px;
    width: 16px;
    height: 16px;
    background: var(--interactive);
    border: 2px solid var(--canvas);
    border-radius: 50%;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg>");
    background-size: 10px 10px;
    background-repeat: no-repeat;
    background-position: center;
  }
  .node-circle { position: relative; }

  /* CONSTELLATION RESET — small chip in the constellation's top-right.
     Always present, only enabled while a principle is active. Uses the
     section-pill chip language so it reads as a peer of the eyebrow. */
  .constellation-reset {
    position: absolute;
    top: 14px;
    right: 14px;
    z-index: 3;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(11, 106, 138, 0.08);
    color: var(--interactive);
    border: 0;
    border-radius: 100px;
    padding: 5px 12px 5px 10px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.18s ease, opacity 0.18s ease;
  }
  .constellation-reset svg {
    width: 11px; height: 11px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2.4;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .constellation-reset:hover:not(:disabled) {
    background: rgba(11, 106, 138, 0.16);
  }
  .constellation-reset:focus-visible {
    outline: 3px solid var(--interactive);
    outline-offset: 2px;
  }
  .constellation-reset:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  h1 {
    font-size: 24px;
    font-weight: 700;
    color: var(--structure);
    letter-spacing: -0.3px;
    line-height: 1.2;
    margin-bottom: 8px;
    text-wrap: pretty;
  }

  .intro-text {
    font-size: 17px;
    line-height: 25.5px;
    color: var(--text);
    margin-bottom: 32px;
    max-width: 64ch;
    text-wrap: pretty;
  }

  /* TWO-COLUMN STAGE — constellation left, reveal panel right.
     Both columns flex equally so they share the row evenly.
     align-items: stretch keeps the reveal card matching the
     constellation's height. */
  .hotspot-layout {
    display: flex;
    gap: 40px;
    align-items: stretch;
  }

  /* CONSTELLATION COLUMN — square, pinned by aspect-ratio. */
  .constellation-wrapper {
    position: relative;
    flex: 1;
    aspect-ratio: 1 / 1;
    background: var(--canvas);
    border: 1.5px solid var(--hairline);
    border-radius: 12px;
    box-shadow: 0 1px 0 rgba(22,25,62,.04), 0 12px 32px -16px rgba(22,25,62,.18);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .constellation-inner {
    position: relative;
    width: 88%;
    aspect-ratio: 1 / 1;
  }

  .constellation-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .constellation-svg line {
    stroke: var(--structure);
    stroke-width: 1.5;
    stroke-dasharray: 6 4;
    opacity: 0.18;
    transition: opacity 0.3s ease, stroke 0.3s ease, stroke-width 0.3s ease;
  }

  .constellation-svg line.highlight {
    opacity: 1;
    stroke: var(--interactive);  /* 6.09:1 on white — passes WCAG 1.4.11 */
    stroke-width: 3;
    stroke-dasharray: none;
  }

  /* NODES — real <button> elements (a11y). All native focus, keyboard,
     and SR semantics inherited. The hit area extends below the circle
     to cover the label, comfortably exceeding the 44×44 minimum. */
  .node {
    position: absolute;
    transform: translate(-50%, -50%);
    z-index: 2;
    cursor: pointer;
    text-align: center;
    transition: transform 0.2s ease, opacity 0.25s ease;
    background: transparent;
    border: 0;
    padding: 4px;
    border-radius: 12px;
    font-family: inherit;
  }
  .node:hover { transform: translate(-50%, -50%) scale(1.05); }
  .node.dimmed { opacity: 0.35; }
  .node:focus-visible {
    outline: 3px solid var(--interactive);
    outline-offset: 4px;
    opacity: 1;  /* Restore full opacity so dimmed nodes show focus ring at AA strength. */
  }

  .node-circle {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--canvas);
    border: 2.5px solid var(--structure);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 6px;
    transition: all 0.25s ease;
    box-shadow: 0 2px 8px rgba(22, 25, 62, 0.08);
  }

  .node[aria-pressed="true"] .node-circle {
    background: var(--structure);
    border-color: var(--structure);
    box-shadow: 0 4px 16px rgba(22, 25, 62, 0.28);
  }

  .node.connected .node-circle {
    border-color: var(--interactive);  /* 6.09:1 on white — passes WCAG 1.4.11 */
    border-width: 3px;
    box-shadow: 0 0 0 4px rgba(11, 106, 138, 0.22), 0 2px 8px rgba(22, 25, 62, 0.08);
  }

  .node-circle svg {
    width: 24px; height: 24px;
    stroke: var(--structure);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.25s ease;
  }
  .node[aria-pressed="true"] .node-circle svg { stroke: var(--canvas); }
  .node-circle .justice-icon { color: var(--structure); }
  .node-circle .justice-icon line { stroke: var(--canvas); }
  .node[aria-pressed="true"] .node-circle .justice-icon { color: var(--canvas); }
  .node[aria-pressed="true"] .node-circle .justice-icon line { stroke: var(--structure); }

  .node-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--structure);
    letter-spacing: -0.005em;
    white-space: nowrap;
    transition: color 0.25s ease;
  }
  .node.connected .node-label {
    color: var(--interactive);
    font-weight: 700;
  }

  /* REVEAL COLUMN — same flex weight as the constellation. Empty state
     and active state both fill the column height, so the row stays
     consistent regardless of selection. */
  .reveal-panel {
    flex: 1;
    display: flex;
    align-items: stretch;
    position: relative;
  }

  .placeholder-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    color: var(--interactive);
    text-align: center;
    padding: 40px 24px;
    background: rgba(255, 255, 255, 0.55);
    border: 1.5px dashed var(--accent);
    border-radius: 12px;
  }
  .placeholder-state svg {
    width: 32px; height: 32px;
    stroke: var(--interactive);
    fill: none;
    stroke-width: 1.6;
    margin-bottom: 14px;
  }
  .placeholder-state p {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.4px;
    text-transform: uppercase;
  }

  .reveal-card {
    background: var(--canvas);
    border: 1.5px solid var(--hairline);
    border-radius: 12px;
    box-shadow: 0 1px 0 rgba(22,25,62,.04), 0 12px 32px -16px rgba(22,25,62,.18);
    padding: 32px;
    width: 100%;
    opacity: 0;
    transform: translateX(8px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    display: none;
    overflow-y: auto;
  }
  .reveal-card.visible {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
    display: block;
  }

  .reveal-card-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }
  .reveal-card-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--structure);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .reveal-card-icon svg {
    width: 24px; height: 24px;
    stroke: var(--canvas);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .reveal-card h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--structure);
    letter-spacing: -0.2px;
    line-height: 1.2;
  }

  .reveal-definition {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 18px;
    text-wrap: pretty;
  }

  /* CALLOUT BOXES — "In practice" and "In tension" share the same
     tinted-box visual language so they read as parallel content
     blocks. Only the overline label distinguishes them. */
  .reveal-practice,
  .reveal-tension {
    background: var(--tint);
    border-left: 3px solid var(--accent);
    padding: 16px 18px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 16px;
  }
  .reveal-tension { margin-bottom: 16px; }
  .callout-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--interactive);
    text-transform: uppercase;
    letter-spacing: 1.8px;
    margin-bottom: 8px;
  }
  .reveal-practice p,
  .reveal-tension p {
    font-size: 15px;
    line-height: 1.55;
    color: var(--text);
    text-wrap: pretty;
  }

  /* TENSION PILLS ROW — small inline strip beneath the in-tension
     callout. Pills enumerate which principles this one conflicts
     with. Hidden entirely for principles with no connections (Justice). */
  .tension-pills-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .tension-pills-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--interactive);
    text-transform: uppercase;
    letter-spacing: 1.8px;
  }
  .tension-pills {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .tension-pill {
    font-size: 10px;
    font-weight: 700;
    color: var(--canvas);
    background: var(--interactive);
    padding: 3px 10px;
    border-radius: 100px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* SR-only helper for live announcements. */
  .visually-hidden {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0);
    white-space: nowrap; border: 0;
  }

  /* STACK BREAKPOINT — Rise/Mighty embeds in the 760–900px range
     were crunching the side-by-side layout. Raised to 900px so any
     iframe under that goes single-column. Side-by-side only at 901px+
     where both columns have real breathing room. */
  @media (max-width: 900px) {
    .activity { padding: 28px; }
    .hotspot-layout {
      flex-direction: column;
      gap: 28px;
    }
    .constellation-wrapper {
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }
    .reveal-panel { min-height: 220px; }
  }

  /* Cap the constellation in side-by-side mode so it doesn't balloon
     on wide iframes — keeps proportions consistent at 1400px+. */
  @media (min-width: 901px) {
    .constellation-wrapper { max-width: 520px; }
  }

  @media (max-width: 540px) {
    .stage { padding: 16px 12px; }
    .activity { padding: 22px; }
    h1 { font-size: 22px; }
    .intro-text { font-size: 16px; line-height: 24px; margin-bottom: 24px; }
    .node-circle { width: 52px; height: 52px; }
    .node-circle svg { width: 20px; height: 20px; }
    .node-label { font-size: 11px; }
    .reveal-card { padding: 22px; }
    .reveal-card h2 { font-size: 18px; }
    .reveal-definition { font-size: 15px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .node, .node-circle, .constellation-svg line,
    .reveal-card, .node-circle svg, .node-label { transition: none !important; }
  }
</style>
</head>
<body>

<main class="stage">
  <div class="frame">
    <div class="activity">
      <div class="hotspot-layout">
        <div class="constellation-wrapper" id="constellation">
          <div class="constellation-progress" id="progress-chip" aria-live="polite">
            <span id="progress-text">0 of 7 explored</span>
          </div>
          <button type="button" class="constellation-reset" id="reset-btn" disabled aria-label="Reset selection">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 3-6.7"/>
              <polyline points="3 4 3 9 8 9"/>
            </svg>
            Reset
          </button>
          <div class="constellation-inner">
            <svg class="constellation-svg" id="lines-svg" viewBox="0 0 480 480" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
              <line data-from="beneficence" data-to="autonomy" x1="168" y1="68" x2="312" y2="68" />
              <line data-from="beneficence" data-to="nonmaleficence" x1="168" y1="68" x2="82" y2="204" />
              <line data-from="autonomy" data-to="nonmaleficence" x1="312" y1="68" x2="82" y2="204" />
              <line data-from="autonomy" data-to="fidelity" x1="312" y1="68" x2="398" y2="204" />
              <line data-from="confidentiality" data-to="nonmaleficence" x1="72" y1="350" x2="82" y2="204" />
              <line data-from="confidentiality" data-to="veracity" x1="72" y1="350" x2="240" y2="440" />
              <line data-from="veracity" data-to="fidelity" x1="240" y1="440" x2="398" y2="204" />
              <line data-from="beneficence" data-to="veracity" x1="168" y1="68" x2="240" y2="440" />
            </svg>

            <button type="button" class="node" data-principle="beneficence" aria-pressed="false" style="left: 35%; top: 14.2%;">
              <span class="node-circle" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              </span>
              <span class="node-label">Beneficence</span>
            </button>

            <button type="button" class="node" data-principle="autonomy" aria-pressed="false" style="left: 65%; top: 14.2%;">
              <span class="node-circle" aria-hidden="true">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
              </span>
              <span class="node-label">Autonomy</span>
            </button>

            <button type="button" class="node" data-principle="nonmaleficence" aria-pressed="false" style="left: 17%; top: 42.5%;">
              <span class="node-circle" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              </span>
              <span class="node-label">Non-maleficence</span>
            </button>

            <button type="button" class="node" data-principle="fidelity" aria-pressed="false" style="left: 83%; top: 42.5%;">
              <span class="node-circle" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
              </span>
              <span class="node-label">Fidelity</span>
            </button>

            <button type="button" class="node" data-principle="confidentiality" aria-pressed="false" style="left: 15%; top: 73%;">
              <span class="node-circle" aria-hidden="true">
                <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <span class="node-label">Confidentiality</span>
            </button>

            <button type="button" class="node" data-principle="justice" aria-pressed="false" style="left: 85%; top: 73%;">
              <span class="node-circle" aria-hidden="true">
                <svg viewBox="0 0 24 24" class="justice-icon">
                  <circle cx="12" cy="12" r="10" fill="currentColor" stroke="none"/>
                  <line x1="7.5" y1="10" x2="16.5" y2="10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="7.5" y1="14.5" x2="16.5" y2="14.5" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
              </span>
              <span class="node-label">Justice</span>
            </button>

            <button type="button" class="node" data-principle="veracity" aria-pressed="false" style="left: 50%; top: 91.7%;">
              <span class="node-circle" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              </span>
              <span class="node-label">Veracity</span>
            </button>
          </div>
        </div>

        <div class="reveal-panel" role="region" aria-live="polite" aria-atomic="true" aria-label="Selected principle details">
          <div class="placeholder-state" id="placeholder">
            <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
            <p>Select a principle to explore</p>
          </div>
          <div class="reveal-card" id="reveal-card">
            <div class="reveal-card-header">
              <div class="reveal-card-icon" id="reveal-icon" aria-hidden="true"></div>
              <h2 id="reveal-title"></h2>
            </div>
            <p class="reveal-definition" id="reveal-definition"></p>
            <div class="reveal-practice" id="reveal-practice-box">
              <span class="callout-label">In practice</span>
              <p id="reveal-practice"></p>
            </div>
            <div class="reveal-tension" id="reveal-tension-box">
              <span class="callout-label" id="tension-callout-label">In tension</span>
              <p id="reveal-tension"></p>
            </div>
            <div class="tension-pills-row" id="tension-pills-row">
              <span class="tension-pills-label">Tension with</span>
              <div class="tension-pills" id="tension-pills"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
const iconSVGs = {
  beneficence: '<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
  nonmaleficence: '<svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
  autonomy: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>',

const principles = {
  beneficence: {
    title: 'Beneficence',
    definition: `Beneficence is acting in the best interest of the individual you serve.`,
    practice: `Connecting the individual to additional community resources even when your service plan does not require it.`,
    tension: `Beneficence pulls against autonomy when what you believe is in someone's best interest doesn't align with what they want. This shows up often around cultural and religious differences. A practitioner may think a Native American teen needs calming strategies to process anger, but the cultural tradition is to process strong emotions through physical work alongside a tribe member. Both beneficence and autonomy are real here, and you have to think carefully about which principle your action would serve.`,
    connections: ['autonomy', 'nonmaleficence']
  },
  nonmaleficence: {
    title: 'Non-maleficence',
    definition: `Non-maleficence is avoiding harm. Some have called it the line in the sand because the principle always applies.`,
    practice: `Declining to share an individual's information informally, even when asked by someone who seems trustworthy.`,
    tension: `Harm in community-based practice doesn't always look dramatic. An individual who reports their full trauma history during agency intake may then have to repeat it to a therapist developing the treatment plan, and again to a practitioner getting to know them. This kind of cumulative harm shows up regularly across well-intentioned processes. Recognizing it and raising it in supervision is part of how non-maleficence shows up in your work.`,
    connections: ['beneficence', 'autonomy', 'confidentiality']
  },
  autonomy: {
    title: 'Autonomy',
    definition: `Autonomy is respecting an individual's right to make their own choices.`,
    practice: `Supporting an individual's decision to decline a service recommendation, even if you disagree.`,
    tension: `Autonomy is tested when an individual's choices conflict with what you personally hold to be right, or with what you believe would help them most. A practitioner whose religious beliefs hold that being transgender is wrong may want to make the case with a transgender individual they're working with. Respecting autonomy means an individual's rights and your beliefs may be in conflict, but the individual's autonomy must be respected.`,
    connections: ['beneficence', 'nonmaleficence', 'fidelity']
  },
  confidentiality: {
    title: 'Confidentiality',
    definition: `Confidentiality is protecting an individual's private information. It carries weight as both a legal obligation and a foundation of trust.`,
    practice: `Stepping away from a shared space before discussing the individual's progress with a supervisor.`,
    tension: `Confidentiality has clear limits in specific situations. Disclosure is required for mandatory reporting, emergencies, and court orders. Youth contexts add nuance: in Virginia, individuals can consent to mental health treatment at age 14, and parental consent is not required by law after that. Outside these specific exceptions, the information belongs to the individual, and your role is to protect it.`,
    connections: ['nonmaleficence', 'veracity']
  },
  veracity: {
    title: 'Veracity',
    definition: `Veracity is being honest and transparent in your role, with the individuals you serve and in supervision and documentation.`,
    practice: `Clearly explaining what your role includes, and what it doesn't, at the start of services.`,
    tension: `Veracity holds even when the truth is uncomfortable. Reassuring an individual with a softer version of the truth can feel kind in the moment, but it sets up a larger break in trust later when the truth surfaces. Being clear about what your role, including the limits of confidentiality, is part of how veracity shows up day to day.`,

  },
  fidelity: {

    definition: `Fidelity is being reliable, professional, and consistent in how you keep commitments and hold your role across sessions.`,

  },
  justice: {
    title: 'Justice',
    definition: `Justice is treating individuals fairly, with equitable access to services regardless of background or systemic barriers.`,
    practice: `Advocating for an individual who is not receiving the same quality of service due to systemic barriers.`,
    overline: 'Across your work',
    tension: `Justice concerns fairness and equitable access across the people you serve. This is different from ethical situations where the key issue is maintaining boundaries within the practitioner-individual relationship. Justice asks you to provide the same quality of attention and effort to every individual you work with, and to bring any concerns to supervision when you notice them.`,
    connections: []
  }
};

const nodes = document.querySelectorAll('.node');
const lines = document.querySelectorAll('#lines-svg line');
const revealCard = document.getElementById('reveal-card');
const placeholder = document.getElementById('placeholder');
const tensionPills = document.getElementById('tension-pills');
const resetBtn = document.getElementById('reset-btn');
const progressChip = document.getElementById('progress-chip');
const progressText = document.getElementById('progress-text');
const TOTAL_PRINCIPLES = Object.keys(principles).length;
const visited = new Set();
let activeNode = null;
let completionFired = false;

resetBtn.addEventListener('click', () => deactivateAll());

function markVisited(key) {
  if (visited.has(key)) return;
  visited.add(key);
  const node = document.querySelector(`.node[data-principle="${key}"]`);
  if (node) node.dataset.visited = 'true';
  updateProgress();
}

function updateProgress() {
  const count = visited.size;
  if (count === TOTAL_PRINCIPLES) {
    progressText.textContent = 'Complete';
    progressChip.classList.add('is-complete');
    if (!completionFired) {
      completionFired = true;
      // Tell Rise/Mighty the activity is done.
      try {
        window.parent.postMessage({ type: 'complete' }, '*');
      } catch (e) { /* parent may be cross-origin restricted; safe to ignore */ }
    }
  } else {
    progressText.textContent = `${count} of ${TOTAL_PRINCIPLES} explored`;
    progressChip.classList.remove('is-complete');
  }
}

nodes.forEach(node => {
  node.addEventListener('click', () => {
    const key = node.dataset.principle;
    if (activeNode === key) { deactivateAll(); return; }
    activate(key);
  });
});

// ESC clears the active selection — keyboard parity with click-to-toggle.
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && activeNode) deactivateAll();
});

function activate(key) {
  activeNode = key;
  const data = principles[key];
  const hasConnections = data.connections.length > 0;
  markVisited(key);

  nodes.forEach(n => {
    n.classList.remove('connected', 'dimmed');
    const nKey = n.dataset.principle;
    if (nKey === key) {
      n.setAttribute('aria-pressed', 'true');
    } else {
      n.setAttribute('aria-pressed', 'false');
      // Justice has no connections — every other node dims so the
      // constellation reads "this principle stands apart from
      // bilateral tensions."
      if (hasConnections && data.connections.includes(nKey)) n.classList.add('connected');
      else n.classList.add('dimmed');
    }
  });

  // No lines highlight when the active node has no connections.
  lines.forEach(line => {
    const from = line.dataset.from;
    const to = line.dataset.to;
    if (hasConnections && ((from === key && data.connections.includes(to)) ||
        (to === key && data.connections.includes(from)))) {
      line.classList.add('highlight');
    } else {
      line.classList.remove('highlight');
    }
  });

  // Two-part labeling. The in-tension callout overline reads "In
  // tension" by default; Justice (and any future no-connections
  // principle) uses its own overline (e.g., "Across your work").
  // The pills row beneath enumerates the principles in tension and
  // hides entirely when there are no connections.
  const tensionCalloutLabel = document.getElementById('tension-callout-label');
  const tensionPillsRow = document.getElementById('tension-pills-row');
  if (hasConnections) {
    tensionCalloutLabel.textContent = 'In tension';
    tensionPillsRow.style.display = '';
    tensionPills.innerHTML = data.connections
      .map(c => `<span class="tension-pill">${principles[c].title}</span>`)
      .join('');
  } else {
    tensionCalloutLabel.textContent = data.overline || 'In tension';
    tensionPillsRow.style.display = 'none';
    tensionPills.innerHTML = '';
  }

  placeholder.style.display = 'none';
  document.getElementById('reveal-icon').innerHTML = iconSVGs[key];
  document.getElementById('reveal-title').textContent = data.title;
  document.getElementById('reveal-definition').textContent = data.definition;
  document.getElementById('reveal-practice').textContent = data.practice;
  document.getElementById('reveal-tension').textContent = data.tension;
  revealCard.classList.add('visible');
  resetBtn.disabled = false;
}

function deactivateAll() {
  activeNode = null;
  nodes.forEach(n => {
    n.classList.remove('connected', 'dimmed');
    n.setAttribute('aria-pressed', 'false');
  });
  lines.forEach(l => l.classList.remove('highlight'));
  placeholder.style.display = 'flex';
  revealCard.classList.remove('visible');
  resetBtn.disabled = true;
}
</script>
