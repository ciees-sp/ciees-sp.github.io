<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emergence</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #08080d; overflow-x: hidden; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useRef, useCallback } = React;

const GRID = 80;
const CELL = 6;
const ENERGY_REGEN = 0.02;
const MAX_GROUND_ENERGY = 1.0;
const CORPSE_DECAY = 0.01;
const MUTATION_RATE = 0.15;
const TICK_MS = 100;

const BG = "#0a0a0f";
const GRAZER_COLOR = "#22cc66";
const PREDATOR_COLOR = "#ee4444";
const SCAVENGER_COLOR = "#aa66ee";
const CHART_BG = "#0d0d14";

const rand = (min, max) => Math.random() * (max - min) + min;
const randInt = (min, max) => Math.floor(rand(min, max + 1));
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const wrap = (v) => ((v % GRID) + GRID) % GRID;

const mutate = (gene) => {
  return gene.map((g, i) => {
    if (Math.random() < MUTATION_RATE) {
      const drift = rand(-0.2, 0.2);
      if (i === 0) return clamp(Math.round(g + drift * 4), 1, 8);
      return clamp(g + drift, 0.05, 1.0);
    }
    return g;
  });
};

const makeGrazer = (x, y, genes) => ({
  type: "grazer", x, y, energy: 0.5, age: 0,
  genes: genes || [randInt(2, 5), rand(0.3, 0.7), rand(0.4, 0.8), rand(0.4, 0.9)],
});
const makePredator = (x, y, genes) => ({
  type: "predator", x, y, energy: 0.7, age: 0,
  genes: genes || [randInt(3, 7), rand(0.2, 0.6), rand(0.5, 0.9), rand(0.5, 1.0)],
});
const makeScavenger = (x, y, genes) => ({
  type: "scavenger", x, y, energy: 0.4, age: 0,
  genes: genes || [randInt(2, 6), rand(0.2, 0.5), rand(0.3, 0.7), rand(0.3, 0.8)],
});

const initWorld = () => {
  const ground = Array.from({ length: GRID }, () =>
    Array.from({ length: GRID }, () => rand(0.2, 0.8))
  );
  const corpses = Array.from({ length: GRID }, () =>
    Array.from({ length: GRID }, () => 0)
  );
  const creatures = [];
  for (let i = 0; i < 120; i++) creatures.push(makeGrazer(randInt(0, GRID - 1), randInt(0, GRID - 1)));
  for (let i = 0; i < 25; i++) creatures.push(makePredator(randInt(0, GRID - 1), randInt(0, GRID - 1)));
  for (let i = 0; i < 30; i++) creatures.push(makeScavenger(randInt(0, GRID - 1), randInt(0, GRID - 1)));
  return { ground, corpses, creatures, generation: 0 };
};

const scan = (world, x, y, range, targetTypes) => {
  const found = [];
  for (let dx = -range; dx <= range; dx++) {
    for (let dy = -range; dy <= range; dy++) {
      if (dx === 0 && dy === 0) continue;
      const nx = wrap(x + dx);
      const ny = wrap(y + dy);
      if (targetTypes.includes("ground") && world.ground[nx][ny] > 0.3)
        found.push({ x: nx, y: ny, type: "ground", value: world.ground[nx][ny] });
      if (targetTypes.includes("corpse") && world.corpses[nx][ny] > 0.1)
        found.push({ x: nx, y: ny, type: "corpse", value: world.corpses[nx][ny] });
      for (const c of world.creatures) {
        if (c.x === nx && c.y === ny && targetTypes.includes(c.type))
          found.push({ x: nx, y: ny, type: c.type, value: c.energy, creature: c });
      }
    }
  }
  return found;
};

const moveToward = (x, y, tx, ty) => {
  let dx = tx - x, dy = ty - y;
  if (Math.abs(dx) > GRID / 2) dx = dx > 0 ? dx - GRID : dx + GRID;
  if (Math.abs(dy) > GRID / 2) dy = dy > 0 ? dy - GRID : dy + GRID;
  return { x: wrap(x + Math.sign(dx)), y: wrap(y + Math.sign(dy)) };
};
const moveAway = (x, y, tx, ty) => {
  let dx = tx - x, dy = ty - y;
  if (Math.abs(dx) > GRID / 2) dx = dx > 0 ? dx - GRID : dx + GRID;
  if (Math.abs(dy) > GRID / 2) dy = dy > 0 ? dy - GRID : dy + GRID;
  return { x: wrap(x - Math.sign(dx)), y: wrap(y - Math.sign(dy)) };
};
const randomStep = (x, y) => ({ x: wrap(x + randInt(-1, 1)), y: wrap(y + randInt(-1, 1)) });

const tick = (world) => {
  const { ground, corpses, creatures } = world;
  const newCreatures = [];
  const births = [];

  for (let i = 0; i < GRID; i++) {
    for (let j = 0; j < GRID; j++) {
      ground[i][j] = Math.min(MAX_GROUND_ENERGY, ground[i][j] + ENERGY_REGEN);
      corpses[i][j] = Math.max(0, corpses[i][j] - CORPSE_DECAY);
    }
  }

  const shuffled = [...creatures].sort(() => Math.random() - 0.5);

  for (const c of shuffled) {
    const [scanRange, fleeThreshold, reproduceThreshold, boldness] = c.genes;
    c.age++;
    const moveCost = 0.008 + scanRange * 0.001;
    c.energy -= moveCost;

    if (c.type === "grazer") {
      const threats = scan(world, c.x, c.y, Math.ceil(scanRange * 0.7), ["predator"]);
      if (threats.length > 0 && Math.random() < (1 - fleeThreshold)) {
        const pos = moveAway(c.x, c.y, threats[0].x, threats[0].y);
        c.x = pos.x; c.y = pos.y;
      } else {
        const food = scan(world, c.x, c.y, scanRange, ["ground"]);
        if (food.length > 0 && Math.random() < boldness) {
          food.sort((a, b) => b.value - a.value);
          const pos = moveToward(c.x, c.y, food[0].x, food[0].y);
          c.x = pos.x; c.y = pos.y;
        } else {
          const pos = randomStep(c.x, c.y);
          c.x = pos.x; c.y = pos.y;
        }
      }
      const eaten = Math.min(ground[c.x][c.y], 0.15);
      ground[c.x][c.y] -= eaten;
      c.energy += eaten * 0.8;

    } else if (c.type === "predator") {
      const prey = scan(world, c.x, c.y, scanRange, ["grazer"]);
      if (prey.length > 0 && Math.random() < boldness) {
        prey.sort((a, b) => a.value - b.value);
        const target = prey[0];
        const pos = moveToward(c.x, c.y, target.x, target.y);
        c.x = pos.x; c.y = pos.y;
        if (c.x === target.creature.x && c.y === target.creature.y) {
          c.energy += target.creature.energy * 0.6;
          corpses[target.creature.x][target.creature.y] += target.creature.energy * 0.3;
          target.creature.energy = 0;
        }
      } else {
        const pos = randomStep(c.x, c.y);
        c.x = pos.x; c.y = pos.y;
      }
      c.energy -= 0.005;

    } else if (c.type === "scavenger") {
      const threats = scan(world, c.x, c.y, Math.ceil(scanRange * 0.5), ["predator"]);
      if (threats.length > 0 && Math.random() < (1 - fleeThreshold) * 0.6) {
        const pos = moveAway(c.x, c.y, threats[0].x, threats[0].y);
        c.x = pos.x; c.y = pos.y;
      } else {
        const food = scan(world, c.x, c.y, scanRange, ["corpse"]);
        if (food.length > 0 && Math.random() < boldness) {
          food.sort((a, b) => b.value - a.value);
          const pos = moveToward(c.x, c.y, food[0].x, food[0].y);
          c.x = pos.x; c.y = pos.y;
        } else {
          const pos = randomStep(c.x, c.y);
          c.x = pos.x; c.y = pos.y;
        }
      }
      const corpseEaten = Math.min(corpses[c.x][c.y], 0.2);
      corpses[c.x][c.y] -= corpseEaten;
      c.energy += corpseEaten * 0.9;
      const grazed = Math.min(ground[c.x][c.y], 0.05);
      ground[c.x][c.y] -= grazed;
      c.energy += grazed * 0.3;
    }

    c.energy = Math.min(c.energy, 1.5);

    if (c.energy > reproduceThreshold + 0.2) {
      const childEnergy = c.energy * 0.4;
      c.energy -= childEnergy;
      const childGenes = mutate(c.genes);
      const cx = wrap(c.x + randInt(-1, 1));
      const cy = wrap(c.y + randInt(-1, 1));
      const makers = { grazer: makeGrazer, predator: makePredator, scavenger: makeScavenger };
      const child = makers[c.type](cx, cy, childGenes);
      child.energy = childEnergy;
      births.push(child);
    }

    if (c.energy > 0) {
      newCreatures.push(c);
    } else {
      corpses[c.x][c.y] += 0.3;
    }
  }

  return { ground, corpses, creatures: [...newCreatures, ...births], generation: world.generation + 1 };
};

function Emergence() {
  const canvasRef = useRef(null);
  const worldRef = useRef(initWorld());
  const historyRef = useRef([]);
  const [running, setRunning] = useState(false);
  const [displayGen, setDisplayGen] = useState(0);
  const [history, setHistory] = useState([]);
  const [creatures, setCreatures] = useState(worldRef.current.creatures);
  const runningRef = useRef(false);

  const render = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const world = worldRef.current;
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, GRID * CELL, GRID * CELL);
    for (let i = 0; i < GRID; i++) {
      for (let j = 0; j < GRID; j++) {
        if (world.ground[i][j] > 0.15) {
          ctx.fillStyle = "rgba(40,80,30," + (0.1 + world.ground[i][j] * 0.4) + ")";
          ctx.fillRect(i * CELL, j * CELL, CELL, CELL);
        }
        if (world.corpses[i][j] > 0.05) {
          ctx.fillStyle = "rgba(90,60,40," + (0.2 + world.corpses[i][j] * 0.5) + ")";
          ctx.fillRect(i * CELL, j * CELL, CELL, CELL);
        }
      }
    }
    for (const c of world.creatures) {
      const colors = { grazer: GRAZER_COLOR, predator: PREDATOR_COLOR, scavenger: SCAVENGER_COLOR };
      ctx.fillStyle = colors[c.type];
      const size = CELL - 2;
      if (c.type === "predator") {
        ctx.beginPath();
        const cx = c.x * CELL + CELL / 2, cy = c.y * CELL + CELL / 2, r = size / 2;
        ctx.moveTo(cx, cy - r); ctx.lineTo(cx + r, cy);
        ctx.lineTo(cx, cy + r); ctx.lineTo(cx - r, cy);
        ctx.closePath(); ctx.fill();
      } else if (c.type === "scavenger") {
        ctx.beginPath();
        ctx.arc(c.x * CELL + CELL / 2, c.y * CELL + CELL / 2, size / 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(c.x * CELL + 1, c.y * CELL + 1, size, size);
      }
    }
  }, []);

  const step = useCallback(() => {
    worldRef.current = tick(worldRef.current);
    const world = worldRef.current;
    if (world.generation % 5 === 0) {
      const grazers = world.creatures.filter(c => c.type === "grazer").length;
      const predators = world.creatures.filter(c => c.type === "predator").length;
      const scavengers = world.creatures.filter(c => c.type === "scavenger").length;
      historyRef.current = [...historyRef.current.slice(-200),
        { gen: world.generation, grazers, predators, scavengers }];
      setHistory([...historyRef.current]);
      setCreatures([...world.creatures]);
    }
    setDisplayGen(world.generation);
    render();
  }, [render]);

  useEffect(() => { render(); }, [render]);

  useEffect(() => {
    runningRef.current = running;
    if (!running) return;
    let frame, lastTick = 0;
    const loop = (timestamp) => {
      if (!runningRef.current) return;
      if (timestamp - lastTick >= TICK_MS) { step(); lastTick = timestamp; }
      frame = requestAnimationFrame(loop);
    };
    frame = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(frame);
  }, [running, step]);

  const handleReset = () => {
    setRunning(false);
    worldRef.current = initWorld();
    historyRef.current = [];
    setHistory([]); setCreatures(worldRef.current.creatures);
    setDisplayGen(0); setTimeout(render, 0);
  };

  // Population chart
  const chartRef = useRef(null);
  useEffect(() => {
    const canvas = chartRef.current;
    if (!canvas || history.length < 2) return;
    const ctx = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;
    ctx.fillStyle = CHART_BG; ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = "#1a1a24"; ctx.lineWidth = 0.5;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath(); ctx.moveTo(0, H/5*i); ctx.lineTo(W, H/5*i); ctx.stroke();
    }
    const maxPop = Math.max(10, ...history.map(h => Math.max(h.grazers, h.predators, h.scavengers)));
    const drawLine = (key, color) => {
      ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.beginPath();
      const s = W / Math.max(1, history.length - 1);
      history.forEach((h, i) => {
        const x = i * s, y = H - (h[key] / maxPop) * H * 0.9 - H * 0.05;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();
    };
    drawLine("grazers", GRAZER_COLOR);
    drawLine("predators", PREDATOR_COLOR);
    drawLine("scavengers", SCAVENGER_COLOR);
    ctx.font = "10px monospace"; ctx.fillStyle = "#555";
    ctx.fillText("max: " + maxPop, 4, 12);
    ctx.fillText("gen: " + (history[history.length-1]?.gen||0), W-70, 12);
  }, [history]);

  // Gene stats
  const geneStats = {};
  for (const type of ["grazer","predator","scavenger"]) {
    const group = creatures.filter(c => c.type === type);
    if (group.length === 0) { geneStats[type] = null; continue; }
    const avg = (idx) => group.reduce((s,c) => s + c.genes[idx], 0) / group.length;
    geneStats[type] = { count: group.length, scan: avg(0).toFixed(1),
      flee: avg(1).toFixed(2), repro: avg(2).toFixed(2), bold: avg(3).toFixed(2) };
  }

  const btnStyle = (bg, color, border) => ({
    background: bg, color, border: "1px solid " + border,
    padding: "6px 16px", borderRadius: 4, cursor: "pointer",
    fontFamily: "monospace", fontSize: 12
  });

  return React.createElement("div", {
    style: { background: "#08080d", minHeight: "100vh", display: "flex",
      flexDirection: "column", alignItems: "center", padding: 20,
      fontFamily: "monospace", color: "#888" }
  },
    React.createElement("div", { style: { marginBottom: 12, textAlign: "center" } },
      React.createElement("div", { style: { fontSize: 18, color: "#ccc", marginBottom: 4, letterSpacing: 2 } }, "EMERGENCE"),
      React.createElement("div", { style: { fontSize: 11, color: "#555" } },
        "three species \u00b7 heritable genes \u00b7 energy economics")
    ),
    React.createElement("canvas", {
      ref: canvasRef, width: GRID * CELL, height: GRID * CELL,
      style: { border: "1px solid #1a1a24", borderRadius: 4 }
    }),
    React.createElement("div", { style: { marginTop: 12, display: "flex", gap: 10, alignItems: "center" } },
      React.createElement("button", {
        onClick: () => setRunning(!running),
        style: btnStyle(running ? "#331111" : "#113311", running ? "#ee6666" : "#66ee66",
          running ? "#442222" : "#224422")
      }, running ? "pause" : "run"),
      React.createElement("button", {
        onClick: step, disabled: running,
        style: { ...btnStyle("#111118", "#888", "#222"), opacity: running ? 0.3 : 1 }
      }, "step"),
      React.createElement("button", {
        onClick: handleReset,
        style: btnStyle("#111118", "#888", "#222")
      }, "reset"),
      React.createElement("span", { style: { fontSize: 12, color: "#555" } }, "gen " + displayGen)
    ),
    React.createElement("div", { style: { marginTop: 12, width: 480 } },
      React.createElement("canvas", {
        ref: chartRef, width: 480, height: 100,
        style: { borderRadius: 4 }
      }),
      React.createElement("div", { style: { marginTop: 6 } },
        ["grazer","predator","scavenger"].map(type => {
          const colors = { grazer: GRAZER_COLOR, predator: PREDATOR_COLOR, scavenger: SCAVENGER_COLOR };
          const d = geneStats[type];
          return React.createElement("div", {
            key: type,
            style: { fontSize: 11, color: d ? colors[type] : "#333", marginBottom: 2, fontFamily: "monospace" }
          }, d ? type + "s: " + d.count + " | scan " + d.scan + " | flee " + d.flee +
                " | repro " + d.repro + " | bold " + d.bold
              : type + "s: extinct");
        })
      )
    ),
    React.createElement("div", {
      style: { marginTop: 16, fontSize: 10, color: "#333", maxWidth: 480,
        textAlign: "center", lineHeight: 1.5 }
    }, "grazers (\u25a0 green) eat ground energy \u00b7 predators (\u25c6 red) hunt grazers \u00b7 scavengers (\u25cf purple) eat corpses",
      React.createElement("br"),
      "each creature carries genes that mutate on reproduction: scan range, flee threshold, reproduce threshold, boldness"
    )
  );
}

ReactDOM.render(React.createElement(Emergence), document.getElementById("root"));
</script>
</body>
</html>
